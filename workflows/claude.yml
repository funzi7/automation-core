name: Claude Fixer

# Generic workflow — synced from automation-core to every participating
# repo. Part of the Self-Healing Loop:
#   ci-doctor (opens claude-fix Issue) → THIS (fixes, opens PR) →
#   codex-gate (reviews) → merge-bot (merges when green).
#
# fail-soft: the first step checks whether ANTHROPIC_API_KEY is set. If
# it is empty (repo intentionally has no key, to restrain cost), the job
# exits GREEN with a log notice instead of failing red. So syncing this
# file to a key-less repo never produces failures and burns ~0 minutes.
#
# Loop-trigger trap: a PR opened with the default GITHUB_TOKEN does NOT
# trigger other workflows (GitHub loop protection), so codex-gate would
# never run on Claude's PR. We therefore hand the action AUTOMATION_PAT
# as github_token (falling back to the default token when the PAT is
# absent, so the action still works in fail-soft repos).

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [labeled, assigned]

# One fix at a time per Issue/PR — and CANCEL any in-flight run when a new
# @claude fix arrives. With cancel-in-progress: false, multiple fixes on the
# same PR ran in PARALLEL and overwrote each other (a ~6-min run "finished"
# with no commit), burning minutes + money. cancel-in-progress: true kills
# the stale run immediately so only the newest fix proceeds.
concurrency:
  group: claude-fix-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: read        # Claude reads CI run logs on PRs/Issues
  id-token: write      # OIDC for the action (harmless if unused)

jobs:
  claude:
    # Trigger on: @claude mention in a comment, an assigned Issue, or an
    # Issue labeled `claude-fix` (the label_trigger path ci-doctor uses).
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issues' && github.event.action == 'assigned') ||
      (github.event_name == 'issues' && github.event.action == 'labeled' && github.event.label.name == 'claude-fix')
    runs-on: ubuntu-latest
    steps:
      - name: Fail-soft check for ANTHROPIC_API_KEY
        id: keycheck
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "${ANTHROPIC_API_KEY}" ]; then
            echo "::notice::ANTHROPIC_API_KEY is not set in this repo — skipping Claude Fixer (fail-soft, no error)."
            echo "has_key=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_key=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        if: steps.keycheck.outputs.has_key == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code
        if: steps.keycheck.outputs.has_key == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # PAT so Claude's PR triggers codex-gate; default token fallback.
          github_token: ${{ secrets.AUTOMATION_PAT || github.token }}
          trigger_phrase: "@claude"
          label_trigger: "claude-fix"
          # --max-turns 20 caps cost (most fixes need far fewer than 35).
          # FINAL, minimal allowlist — this is intentionally the smallest set
          # that still lets the fixer diagnose, edit, run actionlint, and push
          # its branch / open a PR. Deliberately EXCLUDED to stop the
          # shrink-the-allowlist loop and close prompt-injection vectors: bare
          # `Bash`, broad `Bash(git:*)`, arbitrary interpreters / script
          # runners (python/node/npm/pnpm/yarn/pip/make/go/cargo), and
          # `gh api`. git scoped per-subcommand; `git push` is kept because the
          # fixer must push its own branch. gh limited to pr/issue. If the
          # fixer needs something not listed it will fail and land on
          # needs-dima — preferable to an endless allowlist loop.
          claude_args: |
            --max-turns 20
            --allowedTools "Read,Glob,Grep,Edit,Write,Bash(git status),Bash(git diff),Bash(git log),Bash(git add:*),Bash(git commit:*),Bash(git checkout:*),Bash(git branch:*),Bash(git fetch:*),Bash(git push:*),Bash(gh pr:*),Bash(gh issue:*),Bash(actionlint)"
          additional_permissions: |
            actions: read
          prompt: |
            You are the autonomous fixer in a self-healing CI loop. You were
            invoked on a GitHub Issue or PR in this repository.

            If triggered by a `claude-fix` Issue (opened by ci-doctor):
              1. Read the Issue body: it has the failed workflow name, the
                 failed job names, a link to the failing run, and a tail of the
                 failing job logs. Diagnose the ROOT CAUSE from those logs — do
                 not guess.
              2. Create a NEW branch (e.g. `claude/fix-<short-desc>`). NEVER
                 commit or push directly to `main`.
              3. Apply the minimal fix. If the repo has a CLAUDE.md with a
                 build/test/gate command, OBEY it and run that gate locally;
                 it must be green before you open the PR.
              4. Open a PR from your branch that links the Issue with
                 `Fixes #<N>` (the Issue number you were invoked on) and briefly
                 explains the root cause and the fix.
              5. Do NOT merge the PR yourself — codex-gate reviews it and
                 merge-bot merges once everything is green.

            If triggered by an @claude mention, follow the request in the
            comment, working on a branch and opening a PR the same way.

      - name: Label Claude's PR for auto-merge
        if: always() && steps.keycheck.outputs.has_key == 'true'
        uses: actions/github-script@v7
        with:
          # AUTOMATION_PAT (default-token fallback) so merge-bot can pick up the
          # PR. Claude's PRs are authored by the owner (PAT-authed), not a bot,
          # so without the `automerge` label merge-bot can't identify them.
          github-token: ${{ secrets.AUTOMATION_PAT || github.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            // Upsert the label (addLabels only attaches existing labels).
            try {
              await github.rest.issues.createLabel({ owner, repo, name: 'automerge', color: '0e8a16', description: 'Auto-merge by Merge Bot once green' });
            } catch (e) { if (e.status !== 422) core.info(`createLabel automerge failed (ignored): ${e.message}`); }

            async function label(prNumber) {
              try {
                await github.rest.issues.addLabels({ owner, repo, issue_number: prNumber, labels: ['automerge'] });
                core.info(`Labeled PR #${prNumber} automerge.`);
              } catch (e) { core.info(`addLabel automerge on #${prNumber} failed (ignored): ${e.message}`); }
            }

            // @claude on an existing PR (review-comment event) → label that PR.
            if (context.payload.pull_request) { await label(context.payload.pull_request.number); return; }
            // issue_comment on a PR (PRs are issues for that API) → label it.
            if (context.payload.issue && context.payload.issue.pull_request) { await label(context.payload.issue.number); return; }
            // Otherwise a claude-fix Issue: Claude opened a NEW PR that closes it
            // (Fixes #N). Find the open PR(s) linking this issue and label them.
            const issueNum = context.payload.issue && context.payload.issue.number;
            if (!issueNum) { core.info('No issue/PR context to label.'); return; }
            const open = await github.paginate(github.rest.pulls.list, { owner, repo, state: 'open', per_page: 100 });
            const re = new RegExp(`(?:close|closes|closed|fix|fixes|fixed|resolve|resolves|resolved)\\s+#${issueNum}\\b`, 'i');
            const matches = open.filter((pr) => re.test(pr.body || ''));
            if (!matches.length) { core.info(`No open PR found that closes #${issueNum}.`); return; }
            for (const pr of matches) await label(pr.number);
