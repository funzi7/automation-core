name: Claude Fixer

# Generic workflow — synced from automation-core to every participating
# repo. Part of the Self-Healing Loop:
#   ci-doctor (opens claude-fix Issue) → THIS (fixes, opens PR) →
#   codex-gate (reviews) → merge-bot (merges when green).
#
# fail-soft: the first step checks whether ANTHROPIC_API_KEY is set. If
# it is empty (repo intentionally has no key, to restrain cost), the job
# exits GREEN with a log notice instead of failing red. So syncing this
# file to a key-less repo never produces failures and burns ~0 minutes.
#
# Loop-trigger trap: a PR opened with the default GITHUB_TOKEN does NOT
# trigger other workflows (GitHub loop protection), so codex-gate would
# never run on Claude's PR. We therefore hand the action AUTOMATION_PAT
# as github_token (falling back to the default token when the PAT is
# absent, so the action still works in fail-soft repos).

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, labeled, assigned]

# One fix at a time per Issue/PR. cancel-in-progress: FALSE — a Claude run
# costs money by the minute, so we must NEVER cancel one that is already
# burning time. A second event for the same Issue/PR queues BEHIND the
# running one (serialized, not parallel, not cancelled). The real defense
# against duplicate runs is upstream: each event maps to exactly one clause
# in the job `if:` below (no single action fires two runs), and
# codex-auto-fix no longer wakes on Issue events at all.
concurrency:
  group: claude-fix-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: read        # Claude reads CI run logs on PRs/Issues
  id-token: write      # OIDC for the action (harmless if unused)

jobs:
  claude:
    # Trigger on: @claude mention in a comment, an assigned Issue, or an
    # Issue labeled `claude-fix` (the label_trigger path ci-doctor uses).
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issues' && github.event.action == 'assigned') ||
      (github.event_name == 'issues' && github.event.action == 'labeled' && github.event.label.name == 'claude-fix') ||
      (github.event_name == 'issues' && github.event.action == 'opened' && contains(join(github.event.issue.labels.*.name, ','), 'claude-fix'))
    runs-on: ubuntu-latest
    steps:
      - name: Fail-soft check for ANTHROPIC_API_KEY
        id: keycheck
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "${ANTHROPIC_API_KEY}" ]; then
            echo "::notice::ANTHROPIC_API_KEY is not set in this repo — skipping Claude Fixer (fail-soft, no error)."
            echo "has_key=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_key=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        if: steps.keycheck.outputs.has_key == 'true'
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Run Claude Code
        id: claude
        if: steps.keycheck.outputs.has_key == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # PAT so Claude's PR triggers codex-gate; default token fallback.
          github_token: ${{ secrets.AUTOMATION_PAT || github.token }}
          trigger_phrase: "@claude"
          label_trigger: "claude-fix"
          # fix #16: expose the SDK transcript ONLY when the repo opts in via the
          # Actions variable CLAUDE_SHOW_FULL_OUTPUT == 'true'. Default (var unset
          # or any other value) keeps today's hidden output ("full output hidden
          # for security") — the safe default for PUBLIC downstreams, where the
          # transcript can echo file contents into world-readable logs. On a
          # PRIVATE repo, flip the repo Actions var to 'true' temporarily to
          # enumerate permission denials BY TOOL NAME (an error_max_turns run
          # reports permission_denials_count but hides WHICH tools were denied, so
          # the count alone can't tune --allowedTools), then flip it back.
          show_full_output: ${{ vars.CLAUDE_SHOW_FULL_OUTPUT == 'true' }}
          # --max-turns 50 + a BROAD allowlist (fix #7). The previous
          # --max-turns 20 + narrow per-subcommand list caused error_max_turns
          # on paywall-bot #49: the fixer kept trying tools OUTSIDE the allowlist
          # (11 permission_denials), burning all 20 turns on denial churn without
          # opening a fix PR. Now: 50 turns; broad `Bash(git:*)`; the common
          # interpreters/inspectors a fix needs (python/python3/pytest/pip/node/
          # npm + ls/cat/find/head/tail/sed/mkdir/cp/mv); plus MultiEdit. gh
          # stays limited to pr/issue. SECURITY: the fixer can already commit +
          # push code via Edit + git, so a broader COMMAND allowlist adds little
          # marginal risk; tighten if desired. The PR's CI (codex-gate) remains
          # the real validation gate.
          claude_args: |
            --max-turns 50
            --allowedTools "Read,Glob,Grep,Edit,Write,MultiEdit,Bash(git:*),Bash(python:*),Bash(python3:*),Bash(pytest:*),Bash(pip:*),Bash(node:*),Bash(npm:*),Bash(ls:*),Bash(cat:*),Bash(find:*),Bash(head:*),Bash(tail:*),Bash(sed:*),Bash(mkdir:*),Bash(cp:*),Bash(mv:*),Bash(gh pr:*),Bash(gh issue:*),Bash(actionlint)"
          additional_permissions: |
            actions: read
          prompt: |
            You are the autonomous fixer in a self-healing CI loop. You were
            invoked on a GitHub Issue or PR in this repository.

            If triggered by a `claude-fix` Issue (opened by ci-doctor):
              1. Read the Issue body: it has the failed workflow name, the
                 failed job names, a link to the failing run, and a tail of the
                 failing job logs. Diagnose the ROOT CAUSE from those logs — do
                 not guess.
              2. Create a NEW branch (e.g. `claude/fix-<short-desc>`). NEVER
                 commit or push directly to `main`.
              3. Apply the minimal fix. If the repo has a CLAUDE.md with a
                 build/test/gate command, OBEY it and run that gate locally;
                 it must be green before you open the PR.
              4. Open a PR from your branch that links the Issue with
                 `Fixes #<N>` (the Issue number you were invoked on) and briefly
                 explains the root cause and the fix.
              5. Do NOT merge the PR yourself — codex-gate reviews it and
                 merge-bot merges once everything is green.

            Prefer the allowed tools and do NOT attempt tools outside the allowlist (denied calls waste your turn budget); the PR's CI (codex-gate) is the final validation, so do not block on running the full suite locally if the sandbox can't.

            If triggered by an @claude mention, follow the request in the
            comment, working on a branch and opening a PR the same way.

      - name: Swap 👀 → 👎 on a failed fix
        # fix #10: when the Claude step actually RAN but did NOT succeed, change
        # the triggering comment's reaction from 👀 (eyes = "in progress", added
        # by claude-code-action) to 👎, so a failed run doesn't look like it's
        # still checking. Reaction only — no noisy comment. Gated on has_key so a
        # fail-soft no-ANTHROPIC_API_KEY skip (not a failure) isn't 👎'd. Fully
        # fail-soft: a reaction error must NEVER fail the job. Skips Issue events
        # (issues.opened/labeled) that carry no triggering comment id.
        if: ${{ always() && steps.keycheck.outputs.has_key == 'true' && steps.claude.outcome != 'success' }}
        uses: actions/github-script@v7
        with:
          # Same token the action used to add the 👀, so the bot actor matches.
          github-token: ${{ secrets.AUTOMATION_PAT || github.token }}
          script: |
            try {
              const commentId = context.payload.comment && context.payload.comment.id;
              if (!commentId) {
                core.info('No triggering comment id (Issue event) — nothing to react on.');
                return;
              }
              const owner = context.repo.owner;
              const repo = context.repo.repo;
              // issue_comment and pull_request_review_comment use DIFFERENT
              // reaction endpoints — pick by the event name.
              const isReviewComment = context.eventName === 'pull_request_review_comment';
              const listReactions = isReviewComment
                ? github.rest.reactions.listForPullRequestReviewComment
                : github.rest.reactions.listForIssueComment;
              const deleteReaction = isReviewComment
                ? github.rest.reactions.deleteForPullRequestComment
                : github.rest.reactions.deleteForIssueComment;
              const createReaction = isReviewComment
                ? github.rest.reactions.createForPullRequestReviewComment
                : github.rest.reactions.createForIssueComment;
              // Remove the bot's own existing 👀, then add 👎.
              const me = await github.rest.users.getAuthenticated()
                .then((r) => r.data.login).catch(() => null);
              const reactions = await github.paginate(listReactions, {
                owner, repo, comment_id: commentId, per_page: 100,
              });
              for (const rx of reactions) {
                if (rx.content === 'eyes' && (!me || (rx.user && rx.user.login === me))) {
                  try {
                    await deleteReaction({ owner, repo, comment_id: commentId, reaction_id: rx.id });
                  } catch (e) { core.info(`delete 👀 failed (ignored): ${e.message}`); }
                }
              }
              await createReaction({ owner, repo, comment_id: commentId, content: '-1' });
              core.info(`Swapped 👀 → 👎 on comment ${commentId} (failed fix).`);
            } catch (e) {
              core.info(`reaction swap failed (ignored): ${e.message}`);
            }

      - name: Label Claude's PR for auto-merge
        # P1 fix: only label when Claude Code actually RAN AND SUCCEEDED. With
        # always() this labeled PRs even on a failed/cancelled run, so a PR
        # Claude did NOT fix could pick up `automerge` and auto-merge.
        # steps.claude.outcome is 'success' only on a real success; it is
        # 'failure'/'cancelled' on a bad run and 'skipped' in the
        # fail-soft (no ANTHROPIC_API_KEY) path — none of which should label.
        if: steps.claude.outcome == 'success'
        uses: actions/github-script@v7
        with:
          # AUTOMATION_PAT (default-token fallback) so merge-bot can pick up the
          # PR. Claude's PRs are authored by the owner (PAT-authed), not a bot,
          # so without the `automerge` label merge-bot can't identify them.
          github-token: ${{ secrets.AUTOMATION_PAT || github.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            // Upsert the label (addLabels only attaches existing labels).
            try {
              await github.rest.issues.createLabel({ owner, repo, name: 'automerge', color: '0e8a16', description: 'Auto-merge by Merge Bot once green' });
            } catch (e) { if (e.status !== 422) core.info(`createLabel automerge failed (ignored): ${e.message}`); }

            async function label(prNumber) {
              try {
                await github.rest.issues.addLabels({ owner, repo, issue_number: prNumber, labels: ['automerge'] });
                core.info(`Labeled PR #${prNumber} automerge.`);
              } catch (e) { core.info(`addLabel automerge on #${prNumber} failed (ignored): ${e.message}`); }
            }

            // ONLY label a PR that Claude CREATED to resolve a claude-fix Issue:
            // Claude opened a NEW PR closing the triggering Issue (Fixes #N); find
            // the open PR(s) linking this issue and label those. We deliberately do
            // NOT label an arbitrary PR reached via an @claude mention — that would
            // auto-merge any PR that merely mentions Claude (Codex P1).
            const issueNum = context.payload.issue && context.payload.issue.number;
            if (!issueNum) { core.info('No issue/PR context to label.'); return; }
            const open = await github.paginate(github.rest.pulls.list, { owner, repo, state: 'open', per_page: 100 });
            const re = new RegExp(`(?:close|closes|closed|fix|fixes|fixed|resolve|resolves|resolved)\\s+#${issueNum}\\b`, 'i');
            const matches = open.filter((pr) => re.test(pr.body || ''));
            if (!matches.length) { core.info(`No open PR found that closes #${issueNum}.`); return; }
            for (const pr of matches) await label(pr.number);
