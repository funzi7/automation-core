name: Claude Fallback Watchdog

# Watchdog for the self-healing loop. Claude is the FIRST fixer; Codex is the
# BACKUP fixer that runs IN GitHub Actions (codex-backup-fix.yml). When Claude
# was asked to fix a PR (an ai-loop marker with agent=claude state=requested)
# but hasn't delivered within the TIMEOUT, this watchdog dispatches the Codex
# backup, which pushes a fix directly to the SAME PR head branch (no new PR, so
# merge-bot needs no change). Read handoffs/CONTEXT.md for the full loop.
#
# Attempts are counted ONLY by `ai-loop:v1 ... attempt=` markers on the PR —
# never by Codex reviews, inline notes, commits, watchdog re-runs on the same
# marker, debounced @claude fix, or un-pushed patches. fail-soft on a missing
# AUTOMATION_PAT.

on:
  schedule:
    # Every 5 minutes, offset by 2 so it doesn't pile up on :00/:05 crons.
    - cron: '2-59/5 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write
  # fix #18: the late-signal sweep reads codex-gate-verdict check-runs on the
  # GITHUB_TOKEN readonly client (fine-grained PATs can't hold Checks).
  checks: read

concurrency:
  group: claude-fallback-watchdog-${{ github.repository }}
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - name: Fail-soft check for AUTOMATION_PAT
        id: patcheck
        env:
          AUTOMATION_PAT: ${{ secrets.AUTOMATION_PAT }}
        run: |
          if [ -z "${AUTOMATION_PAT}" ]; then
            echo "::notice::AUTOMATION_PAT not set — skipping Claude fallback watchdog (fail-soft)."
            echo "ok=false" >> "$GITHUB_OUTPUT"
          else
            echo "ok=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Scan open PRs and fire the Codex backup on Claude timeout
        if: steps.patcheck.outputs.ok == 'true'
        uses: actions/github-script@v7
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Gate for the Codex backup fixer. Anything other than exactly 'true'
          # (incl. unset) = DISABLED. Default disabled: the backup needs OpenAI
          # quota, which is exhausted (fix #8); flip the repo/Org Actions variable
          # CODEX_BACKUP_ENABLED to 'true' to re-enable once quota is restored.
          CODEX_BACKUP_ENABLED: ${{ vars.CODEX_BACKUP_ENABLED }}
        with:
          # AUTOMATION_PAT so the dispatch + marker comment can trigger and
          # cross repos; GITHUB_TOKEN-authored events don't start workflows.
          github-token: ${{ secrets.AUTOMATION_PAT }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const LABEL_ESCALATE = 'needs-owner';
            const TIMEOUT_MS = 20 * 60 * 1000;   // 20 minutes per ladder stage (scheduled runs lag)
            const BACKUP_WORKFLOW = 'codex-backup-fix.yml';
            // fix #8: only dispatch the (OpenAI-quota-dependent) Codex backup
            // when CODEX_BACKUP_ENABLED is EXACTLY 'true'; otherwise escalate.
            const codexBackupEnabled = process.env.CODEX_BACKUP_ENABLED === 'true';
            const dispatchRef =
              (context.payload.repository && context.payload.repository.default_branch) || 'main';

            // Parse every `<!-- ai-loop:v1 k=v ... -->` marker in a body into
            // attribute objects { root_pr, head, attempt, agent, state }.
            function parseMarkers(body) {
              const out = [];
              const re = /<!--\s*ai-loop:v1\b([^>]*)-->/g;
              let m;
              while ((m = re.exec(body || "")) !== null) {
                const attrs = {};
                for (const part of m[1].trim().split(/\s+/)) {
                  const eq = part.indexOf('=');
                  if (eq > 0) attrs[part.slice(0, eq)] = part.slice(eq + 1);
                }
                out.push(attrs);
              }
              return out;
            }

            const prs = await github.paginate(github.rest.pulls.list, {
              owner, repo, state: 'open', per_page: 100,
            });

            for (const pr of prs) {
              try {
                const prNumber = pr.number;
                const headSha = pr.head.sha;

                // Markers live in BOTH issue comments and inline review-comment
                // replies (the bridge posts to whichever channel Codex used).
                const [issueComments, reviewComments] = await Promise.all([
                  github.paginate(github.rest.issues.listComments, {
                    owner, repo, issue_number: prNumber, per_page: 100,
                  }),
                  github.paginate(github.rest.pulls.listReviewComments, {
                    owner, repo, pull_number: prNumber, per_page: 100,
                  }),
                ]);
                const marked = [];
                for (const c of [...issueComments, ...reviewComments]) {
                  for (const a of parseMarkers(c.body)) {
                    marked.push({ ...a, at: new Date(c.created_at).getTime() });
                  }
                }
                if (!marked.length) continue;

                // Cumulative attempts = max attempt across ALL ai-loop markers
                // on this PR (the ONLY thing that counts as an attempt).
                const attemptNums = marked
                  .map((a) => parseInt(a.attempt, 10))
                  .filter((n) => Number.isFinite(n));
                const maxAttempt = attemptNums.length ? Math.max(...attemptNums) : 0;

                // ---- fix #23: the fixer LADDER, judged ONLY by DELIVERY ----
                // Delivery = a new commit on the PR head ref dated AFTER a ping's
                // timestamp. NEVER judged by a workflow conclusion — claude-code-action
                // reports `success` on a 15s no-op with zero commits (TRF #84), so a
                // conclusion is meaningless. Stages per head: claude → [codex-api if
                // enabled] → codex-cloud → escalate. Each stage fires AT MOST once per
                // head (marker dedupe); escalate is terminal per head.

                // Newest Claude request marker for the CURRENT head.
                const claudeReq = marked
                  .filter((a) => a.agent === 'claude' && a.state === 'requested' && a.head === headSha)
                  .sort((x, y) => y.at - x.at)[0];
                if (!claudeReq) continue;          // nothing waiting on Claude for this head

                const attempt = maxAttempt + 1;

                // DELIVERY HELPER (Part B STEP 3): any commit on the head ref dated
                // strictly AFTER `sinceMs`. Uses the injected octokit (zero modules —
                // the hard rule forbids loading a module, not the injected `github.rest`).
                async function deliveredSince(sinceMs) {
                  try {
                    const cs = await github.paginate(github.rest.repos.listCommits, {
                      owner, repo, sha: pr.head.ref, since: new Date(sinceMs).toISOString(), per_page: 100,
                    });
                    return cs.some((c) => new Date(c.commit.committer.date).getTime() > sinceMs);
                  } catch (e) { core.info(`deliveredSince failed (assume not delivered): ${e.message}`); return false; }
                }
                const newestMarker = (agent, state) => marked
                  .filter((a) => a.agent === agent && a.state === state && a.head === headSha)
                  .sort((x, y) => y.at - x.at)[0];
                async function notify(text) {
                  const tgToken = process.env.TELEGRAM_BOT_TOKEN;
                  const tgChat = process.env.TELEGRAM_CHAT_ID;
                  if (!tgToken || !tgChat) return;
                  try {
                    await fetch(`https://api.telegram.org/bot${tgToken}/sendMessage`, {
                      method: 'POST', headers: { 'Content-Type': 'application/json' },
                      body: JSON.stringify({ chat_id: tgChat, text, disable_web_page_preview: true }),
                    });
                  } catch (e) { core.info(`Telegram failed (ignored): ${e.message}`); }
                }
                async function escalate(reasonText, tgText) {
                  const alreadyEscalated =
                    marked.some((a) => a.agent === 'watchdog' && a.state === 'escalated' && a.head === headSha) ||
                    (pr.labels || []).some((l) => (l.name || l) === LABEL_ESCALATE);
                  if (alreadyEscalated) return;
                  // fix #14B: upsert the label then attach it.
                  try {
                    await github.rest.issues.createLabel({ owner, repo, name: LABEL_ESCALATE, color: 'd93f0b', description: 'Escalation — automation stopped, human needed' });
                  } catch (e) { if (e.status !== 422) core.info(`createLabel ${LABEL_ESCALATE} failed (ignored): ${e.message}`); }
                  try {
                    await github.rest.issues.addLabels({ owner, repo, issue_number: prNumber, labels: [LABEL_ESCALATE] });
                  } catch (e) { core.info(`addLabel failed (ignored): ${e.message}`); }
                  try {
                    await github.rest.issues.createComment({ owner, repo, issue_number: prNumber, body: `<!-- ai-loop:v1 root_pr=${prNumber} head=${headSha} agent=watchdog state=escalated -->\n${reasonText}` });
                  } catch (e) { core.info(`escalation comment failed (ignored): ${e.message}`); }
                  await notify(tgText);
                  core.warning(`PR #${prNumber}: ${reasonText}`);
                }

                // ---- STAGE claude ----
                // Claude delivered? (a commit on the head after its ping) → done.
                if (await deliveredSince(claudeReq.at)) continue;
                // Claude FAILED iff a claude/no_delivery marker exists (claude.yml's
                // delivery check, fix #23 Part A) OR the 20-min window elapsed.
                const claudeFailed =
                  !!newestMarker('claude', 'no_delivery') ||
                  (Date.now() - claudeReq.at >= TIMEOUT_MS);
                if (!claudeFailed) continue;       // still within Claude's window

                // Findings digest for a Codex-cloud comment: copy the body of the
                // bridge's most recent @claude fix comment on this PR (its ai-loop
                // marker locates it); if none, point at the Codex review.
                function findingsDigest() {
                  const src = [...issueComments, ...reviewComments]
                    .filter((c) => /agent=claude\s+state=requested/.test(c.body || '') || /@claude fix/i.test(c.body || ''))
                    .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))[0];
                  if (src && src.body) return src.body.replace(/<!--\s*ai-loop:v1[^>]*-->/g, '').trim();
                  return `Codex flagged findings on this PR — see the Codex review on PR #${prNumber}.`;
                }

                // ---- STAGE codex-api (only when the OpenAI-quota backup is ENABLED) ----
                if (codexBackupEnabled) {
                  const codexReq = newestMarker('codex', 'requested');
                  if (!codexReq) {
                    // Not yet dispatched for this head → dispatch the CI backup.
                    try {
                      await github.rest.actions.createWorkflowDispatch({
                        owner, repo, workflow_id: BACKUP_WORKFLOW, ref: dispatchRef,
                        inputs: { pr_number: String(prNumber), head_sha: headSha, attempt: String(attempt) },
                      });
                    } catch (e) {
                      // Loud-fail (unchanged): dispatch_failed marker, NO burned attempt.
                      core.error(`PR #${prNumber}: codex-api dispatch failed — ${e.message}`);
                      await notify(`⚠️ ${repo} PR #${prNumber}: codex-api dispatch failed — ${e.message}`);
                      const alreadyFlagged = marked.some((a) => a.agent === 'watchdog' && a.state === 'dispatch_failed' && a.head === headSha);
                      if (!alreadyFlagged) {
                        try { await github.rest.issues.createComment({ owner, repo, issue_number: prNumber, body: `<!-- ai-loop:v1 root_pr=${prNumber} head=${headSha} agent=watchdog state=dispatch_failed -->\nBackup dispatch was blocked (see run logs / annotations). The watchdog will retry automatically once resolved; no attempt was consumed.` }); } catch (e2) { core.info(`marker comment failed (ignored): ${e2.message}`); }
                      }
                      continue;
                    }
                    try { await github.rest.issues.createComment({ owner, repo, issue_number: prNumber, body: `<!-- ai-loop:v1 root_pr=${prNumber} head=${headSha} attempt=${attempt} agent=codex state=requested -->\nClaude didn't deliver on the current head — dispatched the Codex API backup fixer (attempt ${attempt}).` }); } catch (e) { core.info(`marker comment failed (ignored): ${e.message}`); }
                    await notify(`ℹ️ ${repo} PR #${prNumber}: Claude didn't deliver → dispatched Codex API backup (attempt ${attempt}).`);
                    core.info(`PR #${prNumber}: STAGE codex-api dispatched (attempt ${attempt}).`);
                    continue;                       // wait its 20-min delivery window
                  }
                  if (await deliveredSince(codexReq.at)) continue;   // Codex API delivered
                  if (Date.now() - codexReq.at < TIMEOUT_MS) continue;   // still within its window
                  // codex-api failed delivery → fall through to codex-cloud
                }

                // ---- STAGE codex-cloud (NEW) — subscription-billed Codex Cloud ----
                // A PAT/owner-authored `@codex fix` top-level comment provably wakes
                // it (TRF #84). HARD LIMIT: at most ONE codex-cloud attempt per head.
                const cloudReq = newestMarker('codex-cloud', 'requested');
                if (!cloudReq) {
                  const digest = findingsDigest();
                  try {
                    await github.rest.issues.createComment({
                      owner, repo, issue_number: prNumber,
                      body: `<!-- ai-loop:v1 root_pr=${prNumber} head=${headSha} attempt=${attempt} agent=codex-cloud state=requested -->\n@codex fix\n\n[auto-triggered]\n\nClaude did not deliver a fix for the findings below — apply a fix for each:\n\n${digest}`,
                    });
                  } catch (e) { core.info(`codex-cloud comment failed (ignored): ${e.message}`); continue; }
                  await notify(`ℹ️ ${repo} PR #${prNumber}: Claude${codexBackupEnabled ? '/Codex-API' : ''} didn't deliver → asked Codex Cloud (@codex fix, attempt ${attempt}).`);
                  core.info(`PR #${prNumber}: STAGE codex-cloud requested (attempt ${attempt}).`);
                  continue;                         // wait its 20-min delivery window
                }
                if (await deliveredSince(cloudReq.at)) continue;   // Codex Cloud delivered
                if (Date.now() - cloudReq.at < TIMEOUT_MS) continue;   // still within its window

                // ---- STAGE escalate — every enabled stage failed delivery ----
                await escalate(
                  `Claude${codexBackupEnabled ? ', the Codex API backup,' : ''} and Codex Cloud didn't deliver a fix for the current head — escalated to needs-owner.`,
                  `🚨 ${repo} PR #${prNumber}: Claude${codexBackupEnabled ? ' + Codex API' : ''} + Codex Cloud didn't deliver — escalated to needs-owner.`,
                );
              } catch (e) {
                core.info(`PR #${pr.number}: watchdog error (ignored): ${e.message}`);
              }
            }

      # fix #18 — late-signal sweep. INCIDENT: Codex's 👍 landed AFTER the gate's
      # 3-attempt poll window (~4.5 min) closed. A reaction fires NO webhook event,
      # so nothing re-runs the gate and the PR strands red-pending forever (until a
      # manual re-run). This piggybacks on the EXISTING hourly-ish watchdog schedule
      # (zero new billed workflow runs): for each open PR whose codex-gate-verdict is
      # 🟡-pending (or absent) on the head, if a FRESH Codex signal exists on the head
      # it re-dispatches the gate on the head branch — exactly as the gate's own
      # scheduleRerun does. Self-limiting: after the dispatched run the verdict is 🟢
      # (candidate condition clears) or 🔴 (skipped thereafter) — at most one extra
      # gate run per stuck head per tick. Runs AFTER the timeout logic; never blocks
      # it (own step, whole body try/catch, each PR its own try/catch).
      - name: Late-signal sweep — re-dispatch stuck gates on a fresh Codex signal
        if: steps.patcheck.outputs.ok == 'true'
        uses: actions/github-script@v7
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # fix #18: Checks read runs on GITHUB_TOKEN — fine-grained PATs cannot
          # hold the Checks permission (see merge-bot fix #17 Part C). The gate
          # dispatch (a mutation) stays on AUTOMATION_PAT, the token the watchdog
          # already dispatches with (has actions: write; GITHUB_TOKEN-authored
          # events don't reliably start workflows).
          GH_READONLY_TOKEN: ${{ github.token }}
        with:
          github-token: ${{ secrets.AUTOMATION_PAT }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            // Reads (Checks) on GITHUB_TOKEN; mutations/dispatch on the PAT (`github`).
            // fix #19: NO module loading inside github-script — both the v7 and the v8
            // forms of loading the @actions/github module crash "Cannot find module"
            // (ncc bundle, no node_modules). The Checks read uses the built-in global
            // fetch (raw REST), zero modules.
            const GH_RO = process.env.GH_READONLY_TOKEN;
            // fix #20: follow the Link rel="next" header until absent (50-page
            // safety ceiling) — true pagination, replacing the fixed 10-page valve.
            async function roPage(url) {
              const res = await fetch(url, { headers: { Authorization: `Bearer ${GH_RO}`, Accept: 'application/vnd.github+json', 'X-GitHub-Api-Version': '2022-11-28' } });
              if (!res.ok) throw new Error(`GET ${url} -> ${res.status}: ${(await res.text()).slice(0, 200)}`);
              const m = (res.headers.get('link') || '').match(/<([^>]+)>;\s*rel="next"/);
              return { data: await res.json(), next: m ? m[1] : null };
            }
            async function roPaged(path, extract) {
              const out = [];
              let url = `https://api.github.com${path}`;
              for (let i = 0; i < 50 && url; i++) {
                const { data, next } = await roPage(url);
                out.push(...extract(data));
                url = next;
              }
              return out;
            }
            const roCheckRuns = (ref) => roPaged(`/repos/${owner}/${repo}/commits/${encodeURIComponent(ref)}/check-runs?per_page=100`, (d) => d.check_runs || []);
            // Verbatim from codex-gate.yml's pending publish call.
            const PENDING_TITLE = '🟡 Waiting for Codex review';
            const GATE_WORKFLOW = 'codex-gate.yml';
            const VERDICT_CHECK = 'codex-gate-verdict';
            // fix #21: trusted-sync grace window (must EQUAL codex-gate.yml's).
            const SYNC_GRACE_MINUTES = 30;
            // Trusted-sync predicate — must match merge-bot.yml / codex-gate.yml — keep in sync.
            const SYNC_TITLE_PREFIX = 'chore(automation): sync from automation-core';
            const SYNC_BRANCH = 'chore/sync-automation-core';   // branch the sync workflow opens
            const OWNER_LOGIN = 'funzi7';
            const isTrustedSync = (pr) => {
              const titleIsSync = (pr.title || '').startsWith(SYNC_TITLE_PREFIX);
              const sameRepo = !!(pr.head && pr.head.repo && pr.head.repo.full_name === `${owner}/${repo}`);
              return titleIsSync && (
                (pr.user && pr.user.login === OWNER_LOGIN) ||
                ((pr.head && pr.head.ref === SYNC_BRANCH) && sameRepo)
              );
            };
            const OVERRIDE_LABEL = 'codex-p1-acknowledged';

            // EXACT Codex-author matcher the gate uses for reviews + reactions.
            const isCodex = (user) =>
              user?.login === 'chatgpt-codex-connector[bot]' ||
              user?.login === 'codex' ||
              (user?.type === 'Bot' && user?.login?.toLowerCase().includes('codex'));

            async function telegram(text) {
              const tgToken = process.env.TELEGRAM_BOT_TOKEN;
              const tgChat = process.env.TELEGRAM_CHAT_ID;
              if (!tgToken || !tgChat) return;
              try {
                await fetch(`https://api.telegram.org/bot${tgToken}/sendMessage`, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ chat_id: tgChat, text, disable_web_page_preview: true }),
                });
              } catch (e) { core.info(`Telegram failed (ignored): ${e.message}`); }
            }

            try {
              const prs = await github.paginate(github.rest.pulls.list, {
                owner, repo, state: 'open', per_page: 100,
              });

              // fix #21 Part C: ensure the override label the gate's own 🟡 summary
              // tells humans to add actually EXISTS in this repo — it did NOT
              // downstream (the incident). Upsert once per tick; 422 = already
              // present (fine). Mirrors the needs-owner upsert pattern.
              try {
                await github.rest.issues.createLabel({
                  owner, repo, name: OVERRIDE_LABEL, color: '0e8a16',
                  description: 'Override: acknowledge Codex P1/P2 findings and let the Codex Gate pass',
                });
              } catch (e) {
                if (e.status !== 422) core.info(`createLabel ${OVERRIDE_LABEL} failed (ignored): ${e.message}`);
              }

              for (const pr of prs) {
                try {
                  const prNumber = pr.number;
                  const headSha = pr.head.sha;
                  const head7 = headSha.substring(0, 7);

                  // fix #23 Part C: auto update-branch for a STALE loop PR so the
                  // fixer AND the gate always work the CURRENT head — the update
                  // advances the head, which re-runs the gate and lets the fixer
                  // ladder continue on the fresh head. Loop PR = carries an ai-loop
                  // marker OR a `claude/*` head ref OR a trusted sync. Only when the
                  // base has moved (mergeable_state 'behind') and NOT escalated;
                  // NEVER for 'dirty' — real conflicts stay a human's job. Mutation
                  // → AUTOMATION_PAT (`github`). At most once per PR per tick.
                  try {
                    const hasNeedsOwner = (pr.labels || []).some((l) => (l.name || l) === 'needs-owner');
                    let loopPr = (!!(pr.head && pr.head.ref && pr.head.ref.startsWith('claude/'))) || isTrustedSync(pr);
                    if (!loopPr) {
                      const [ic, rc] = await Promise.all([
                        github.paginate(github.rest.issues.listComments, { owner, repo, issue_number: prNumber, per_page: 100 }),
                        github.paginate(github.rest.pulls.listReviewComments, { owner, repo, pull_number: prNumber, per_page: 100 }),
                      ]);
                      loopPr = [...ic, ...rc].some((c) => /ai-loop:v1/.test(c.body || ''));
                    }
                    if (loopPr && !hasNeedsOwner) {
                      const { data: full } = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });
                      if (full.mergeable_state === 'behind') {
                        try {
                          await github.rest.pulls.updateBranch({ owner, repo, pull_number: prNumber, expected_head_sha: headSha });
                          core.info(`auto update-branch: PR #${prNumber}`);
                        } catch (e) {
                          core.error(`auto update-branch failed for PR #${prNumber} — ${e.message}`);
                          await telegram(`⚠️ ${repo} PR #${prNumber}: auto update-branch failed — ${e.message}`);
                        }
                      }
                    }
                  } catch (e) { core.info(`update-branch check PR #${prNumber} (ignored): ${e.message}`); }

                  // latestCommitDate — computed EXACTLY as the gate does: the MAX
                  // committer date across the PR's commits (else pr.created_at).
                  const prCommits = await github.paginate(github.rest.pulls.listCommits, {
                    owner, repo, pull_number: prNumber, per_page: 100,
                  });
                  const latestCommitDate = prCommits.length > 0
                    ? new Date(Math.max(...prCommits.map(c => new Date(c.commit.committer.date).getTime())))
                    : new Date(pr.created_at);

                  // Newest codex-gate-verdict check-run on the head (READ → GITHUB_TOKEN).
                  const checkRuns = await roCheckRuns(headSha);
                  const recency = (c) => new Date(c.completed_at || c.started_at || 0).getTime();
                  const newestVerdict = checkRuns
                    .filter((c) => c.name === VERDICT_CHECK)
                    .sort((a, b) => recency(b) - recency(a))[0];
                  const title = newestVerdict && newestVerdict.output && newestVerdict.output.title;
                  // Candidate iff 🟡 pending OR no verdict on the head at all. A 🟢
                  // needs nothing; a 🔴 (active P1/P2) is the bridge's job — re-
                  // dispatching would change nothing.
                  const isCandidate = !newestVerdict || title === PENDING_TITLE;
                  if (!isCandidate) continue;

                  // FRESH Codex signal on the head, mirroring the gate's matchers:
                  // a Codex review submitted_at > latestCommitDate, OR a Codex-
                  // authored issue-level 👍 created_at > latestCommitDate.
                  const [reviews, reactions] = await Promise.all([
                    github.paginate(github.rest.pulls.listReviews, {
                      owner, repo, pull_number: prNumber, per_page: 100,
                    }),
                    github.paginate(github.rest.reactions.listForIssue, {
                      owner, repo, issue_number: prNumber, per_page: 100,
                    }),
                  ]);
                  const freshReview = reviews.some(
                    (r) => isCodex(r.user) && r.submitted_at &&
                           new Date(r.submitted_at) > latestCommitDate
                  );
                  const freshThumbs = reactions.some(
                    (r) => isCodex(r.user) && r.content === '+1' &&
                           new Date(r.created_at) > latestCommitDate
                  );
                  const freshSignal = freshReview || freshThumbs;

                  // fix #21 Part B: two dispatch classes for a 🟡-pending/no-verdict
                  // candidate — (1) a FRESH Codex signal the gate's own poll missed
                  // (late-👍/review), or (2) a TRUSTED SYNC that has stayed SILENT past
                  // the grace window (Codex never engaged), so the gate's grace-green
                  // needs a run to land on the head. Neither → skip.
                  const graceMs = SYNC_GRACE_MINUTES * 60 * 1000;
                  const headAgeMs = Date.now() - latestCommitDate.getTime();
                  const silentSyncStale = isTrustedSync(pr) && headAgeMs > graceMs;
                  if (!freshSignal && !silentSyncStale) continue;
                  const logMsg = freshSignal
                    ? `late-signal sweep: dispatching gate for PR #${prNumber} @ ${head7}`
                    : `silent-sync grace: dispatching gate for PR #${prNumber} @ ${head7}`;

                  // Re-dispatch the gate on the head BRANCH, exactly as scheduleRerun
                  // does (dispatch run's head_sha == pr.head.sha, so the check lands on
                  // the head). Self-limiting: the dispatched run flips the verdict
                  // 🟡→🟢, so the PR stops matching next tick.
                  try {
                    await github.rest.actions.createWorkflowDispatch({
                      owner, repo, workflow_id: GATE_WORKFLOW, ref: pr.head.ref,
                      inputs: { pr_number: String(prNumber) },
                    });
                    core.info(logMsg);
                  } catch (e) {
                    // fix #4 loud-fail: annotate + Telegram; never crash the sweep.
                    core.error(`sweep: gate dispatch failed for PR #${prNumber} @ ${head7} — ${e.message}`);
                    await telegram(`⚠️ ${repo} PR #${prNumber}: sweep gate dispatch failed — ${e.message}`);
                  }
                } catch (e) {
                  core.info(`late-signal sweep: PR #${pr.number} error (ignored): ${e.message}`);
                }
              }
            } catch (e) {
              core.error(`late-signal sweep failed (ignored): ${e.message}`);
            }
