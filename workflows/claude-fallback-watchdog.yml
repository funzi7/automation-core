name: Claude Fallback Watchdog

# Watchdog for the self-healing loop. Claude is the FIRST fixer; Codex is the
# BACKUP fixer that runs IN GitHub Actions (codex-backup-fix.yml). When Claude
# was asked to fix a PR (an ai-loop marker with agent=claude state=requested)
# but hasn't delivered within the TIMEOUT, this watchdog dispatches the Codex
# backup, which pushes a fix directly to the SAME PR head branch (no new PR, so
# merge-bot needs no change). Read handoffs/CONTEXT.md for the full loop.
#
# Attempts are counted ONLY by `ai-loop:v1 ... attempt=` markers on the PR —
# never by Codex reviews, inline notes, commits, watchdog re-runs on the same
# marker, debounced @claude fix, or un-pushed patches. fail-soft on a missing
# AUTOMATION_PAT.

on:
  schedule:
    # Every 5 minutes, offset by 2 so it doesn't pile up on :00/:05 crons.
    - cron: '2-59/5 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: claude-fallback-watchdog-${{ github.repository }}
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - name: Fail-soft check for AUTOMATION_PAT
        id: patcheck
        env:
          AUTOMATION_PAT: ${{ secrets.AUTOMATION_PAT }}
        run: |
          if [ -z "${AUTOMATION_PAT}" ]; then
            echo "::notice::AUTOMATION_PAT not set — skipping Claude fallback watchdog (fail-soft)."
            echo "ok=false" >> "$GITHUB_OUTPUT"
          else
            echo "ok=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Scan open PRs and fire the Codex backup on Claude timeout
        if: steps.patcheck.outputs.ok == 'true'
        uses: actions/github-script@v7
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        with:
          # AUTOMATION_PAT so the dispatch + marker comment can trigger and
          # cross repos; GITHUB_TOKEN-authored events don't start workflows.
          github-token: ${{ secrets.AUTOMATION_PAT }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const LABEL_ESCALATE = 'needs-owner';
            const TIMEOUT_MS = 20 * 60 * 1000;   // 20 minutes (scheduled runs lag)
            const MAX_ATTEMPTS = 3;
            const CLAUDE_APP = 'claude[bot]';     // Claude fixer commit author login
            const BACKUP_WORKFLOW = 'codex-backup-fix.yml';
            const dispatchRef =
              (context.payload.repository && context.payload.repository.default_branch) || 'main';

            // Parse every `<!-- ai-loop:v1 k=v ... -->` marker in a body into
            // attribute objects { root_pr, head, attempt, agent, state }.
            function parseMarkers(body) {
              const out = [];
              const re = /<!--\s*ai-loop:v1\b([^>]*)-->/g;
              let m;
              while ((m = re.exec(body || "")) !== null) {
                const attrs = {};
                for (const part of m[1].trim().split(/\s+/)) {
                  const eq = part.indexOf('=');
                  if (eq > 0) attrs[part.slice(0, eq)] = part.slice(eq + 1);
                }
                out.push(attrs);
              }
              return out;
            }

            const prs = await github.paginate(github.rest.pulls.list, {
              owner, repo, state: 'open', per_page: 100,
            });

            for (const pr of prs) {
              try {
                const prNumber = pr.number;
                const headSha = pr.head.sha;

                // Markers live in BOTH issue comments and inline review-comment
                // replies (the bridge posts to whichever channel Codex used).
                const [issueComments, reviewComments] = await Promise.all([
                  github.paginate(github.rest.issues.listComments, {
                    owner, repo, issue_number: prNumber, per_page: 100,
                  }),
                  github.paginate(github.rest.pulls.listReviewComments, {
                    owner, repo, pull_number: prNumber, per_page: 100,
                  }),
                ]);
                const marked = [];
                for (const c of [...issueComments, ...reviewComments]) {
                  for (const a of parseMarkers(c.body)) {
                    marked.push({ ...a, at: new Date(c.created_at).getTime() });
                  }
                }
                if (!marked.length) continue;

                // Cumulative attempts = max attempt across ALL ai-loop markers
                // on this PR (the ONLY thing that counts as an attempt).
                const attemptNums = marked
                  .map((a) => parseInt(a.attempt, 10))
                  .filter((n) => Number.isFinite(n));
                const maxAttempt = attemptNums.length ? Math.max(...attemptNums) : 0;

                // Newest Claude request marker for the CURRENT head.
                const claudeReq = marked
                  .filter((a) => a.agent === 'claude' && a.state === 'requested' && a.head === headSha)
                  .sort((x, y) => y.at - x.at)[0];
                if (!claudeReq) continue;          // nothing waiting on Claude for this head

                // If the head moved since the marker, a fresh review cycle will
                // start cleanly — do nothing. (head match is implied above, but
                // keep explicit for clarity.)
                if (claudeReq.head !== headSha) continue;

                // Already fired Codex for this exact head? Match only a codex
                // requested/pushed marker — a watchdog dispatch_failed marker must
                // NOT be read as "already fired" (that would block the auto-retry).
                if (marked.some((a) => a.agent === 'codex' && (a.state === 'requested' || a.state === 'pushed') && a.head === headSha)) continue;

                // Has Claude already delivered for this head? A commit on the head
                // authored by the Claude app AFTER the request marker. (A linked
                // claude/* result branch would also count; best-effort, skipped
                // if not determinable from commits.)
                let claudeDelivered = false;
                try {
                  const commits = await github.paginate(github.rest.pulls.listCommits, {
                    owner, repo, pull_number: prNumber, per_page: 100,
                  });
                  claudeDelivered = commits.some((c) => {
                    const login = (c.author && c.author.login) || "";
                    const aname = (c.commit && c.commit.author && c.commit.author.name) || "";
                    const cdate = new Date(c.commit.author.date).getTime();
                    return (login === CLAUDE_APP || /claude/i.test(aname)) && cdate > claudeReq.at;
                  });
                } catch (e) { /* best-effort */ }
                if (claudeDelivered) continue;

                // Timeout elapsed since the request?
                if (Date.now() - claudeReq.at < TIMEOUT_MS) continue;

                // 3-attempt cap reached → escalate, do NOT fire Codex.
                if (maxAttempt >= MAX_ATTEMPTS) {
                  try {
                    await github.rest.issues.addLabels({
                      owner, repo, issue_number: prNumber, labels: [LABEL_ESCALATE],
                    });
                  } catch (e) { core.info(`addLabel failed (ignored): ${e.message}`); }
                  const tgToken = process.env.TELEGRAM_BOT_TOKEN;
                  const tgChat = process.env.TELEGRAM_CHAT_ID;
                  if (tgToken && tgChat) {
                    try {
                      await fetch(`https://api.telegram.org/bot${tgToken}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                          chat_id: tgChat,
                          text: `🚨 ${repo} PR #${prNumber}: ${maxAttempt} fix attempts didn't converge — escalated to needs-owner.`,
                          disable_web_page_preview: true,
                        }),
                      });
                    } catch (e) { core.info(`Telegram failed (ignored): ${e.message}`); }
                  }
                  core.warning(`PR #${prNumber}: ${maxAttempt} attempts without converging — escalated to needs-owner.`);
                  continue;
                }

                // Time for the Codex backup. Dispatch the CI fixer for this head.
                const attempt = maxAttempt + 1;
                try {
                  await github.rest.actions.createWorkflowDispatch({
                    owner, repo, workflow_id: BACKUP_WORKFLOW, ref: dispatchRef,
                    inputs: {
                      pr_number: String(prNumber),
                      head_sha: headSha,
                      attempt: String(attempt),
                    },
                  });
                } catch (e) {
                  // Make a blocked dispatch LOUD (root cause: createWorkflowDispatch
                  // 403 when AUTOMATION_PAT lacks Actions: write). Do NOT burn an
                  // attempt or escalate — leave the attempt un-marked so the watchdog
                  // retries each tick and self-heals once the PAT scope is fixed.
                  core.error(`PR #${prNumber}: backup dispatch failed — ${e.message}`);
                  const tgToken = process.env.TELEGRAM_BOT_TOKEN;
                  const tgChat = process.env.TELEGRAM_CHAT_ID;
                  if (tgToken && tgChat) {
                    try {
                      await fetch(`https://api.telegram.org/bot${tgToken}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                          chat_id: tgChat,
                          text: `⚠️ ${repo} PR #${prNumber}: backup dispatch failed — ${e.message}`,
                          disable_web_page_preview: true,
                        }),
                      });
                    } catch (e2) { core.info(`Telegram failed (ignored): ${e2.message}`); }
                  }
                  // Dedupe the failure flag to once per head — NO attempt= field, so
                  // it never burns an attempt and never trips the attempt counter.
                  const alreadyFlagged = marked.some(
                    (a) => a.agent === 'watchdog' && a.state === 'dispatch_failed' && a.head === headSha,
                  );
                  if (!alreadyFlagged) {
                    try {
                      await github.rest.issues.createComment({
                        owner, repo, issue_number: prNumber,
                        body: `<!-- ai-loop:v1 root_pr=${prNumber} head=${headSha} agent=watchdog state=dispatch_failed -->\nBackup dispatch was blocked (see run logs / annotations). The watchdog will retry automatically once resolved; no attempt was consumed.`,
                      });
                    } catch (e2) { core.info(`marker comment failed (ignored): ${e2.message}`); }
                  }
                  continue;
                }
                // Record a codex/requested marker so the attempt is counted and
                // the watchdog won't re-fire on the next 5-minute tick.
                try {
                  await github.rest.issues.createComment({
                    owner, repo, issue_number: prNumber,
                    body: `<!-- ai-loop:v1 root_pr=${prNumber} head=${headSha} attempt=${attempt} agent=codex state=requested -->\nClaude fix timed out (>20m) on the current head — dispatched the Codex backup fixer (attempt ${attempt}).`,
                  });
                } catch (e) { core.info(`marker comment failed (ignored): ${e.message}`); }
                core.info(`PR #${prNumber}: fired Codex backup (attempt ${attempt}) for head ${headSha}.`);
              } catch (e) {
                core.info(`PR #${pr.number}: watchdog error (ignored): ${e.message}`);
              }
            }
