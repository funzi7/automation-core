name: Codex Gate

# Blocking status check `check-codex-status`. GREEN requires BOTH:
#   1. Codex has REVIEWED the current head — a Codex signal (review, comment,
#      inline note, or 👍 reaction) DATED AFTER the latest commit.
#   2. No ACTIVE P1 on the head — a P1 marker DATED AFTER the latest commit,
#      not yet followed by a later Codex fix Summary.
# ONE consistent freshness rule for both: a signal counts only if its
# timestamp is after the latest commit's committer date. commit_id is
# deliberately NEVER used to decide freshness — GitHub re-points a still-
# applicable inline comment's commit_id to the new head, so commit_id == head
# does NOT mean Codex reviewed the new commit (it can be an old/stale comment
# whose line still exists). Using commit_id would (a) make a stale P1 falsely
# active OR (b) make a stale comment falsely read as a fresh review and flip
# the gate green before Codex actually re-reviews — the merge-before-review
# race through a side door. Date-only closes both.
# It BLOCKS when an active P1 OR an active P2 is unresolved OR Codex hasn't
# reviewed the head yet (pending). A stale P1/P2 (predating the latest commit) /
# clean review / 👍 / P3 are all green. `codex-p1-acknowledged` label = manual
# override.
#
# RE-CHECK MODEL (fix #25 — the head-targeted self-rerun POLL was DELETED):
#   merge-bot reads `check-codex-status` via checks.listForRef(pr.head.sha), so
#   the verdict must land on the HEAD commit. The gate re-evaluates on Codex
#   activity (pull_request_review / issue_comment) and on `pull_request`
#   opened/synchronize — those run against the head, so the check lands there.
#   The two cases that don't fire a head-run on their own — a late 👍 reaction
#   (no event) and a silent trusted sync — are covered elsewhere now: the
#   watchdog SWEEP (fix #18) re-dispatches the gate on the head branch (≤~1h) and
#   the trusted-sync GRACE-GREEN (fix #21) auto-clears. Manual re-check: Actions →
#   Codex Gate → Run workflow with the PR number, or add the
#   `codex-p1-acknowledged` label. The old in-run 90s `sleep` + createWorkflowDispatch
#   poll — the single biggest per-wave cost (TRF #88: ~10-12 of ~15 runner-min) — is gone.
#
# Why a re-pointed commit_id can't cause a premature green: "has reviewed" is
# date-only, so an old inline comment whose commit_id GitHub re-pointed to the
# new head does NOT count as a review of the new head — the gate stays pending
# until Codex posts a signal actually dated after the latest commit. (And the
# active-P1 test is the same date-only basis, so a stale P1 doesn't false-block
# either.)
#
# P1 AND P2 detection is the SAME as the bridge (p1Pattern/p2Pattern via the
# same badge fragments + stripSummarySections) across the same 3 channels, fully
# paginated — gate-block severity == bridge-trigger severity, so a P2-no-P1 PR
# can't merge before its fix lands (the race Codex flagged on #48). fail-soft: a
# technical error evaluating a PR does NOT block; a detected P1/P2 always blocks
# (safety wins).

on:
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_review:
    types: [submitted, edited, dismissed]
  issue_comment:
    types: [created, edited, deleted]
  # fix #25: `pull_request_review_comment` was REMOVED. The verdict is evaluated
  # against the WHOLE head every run; a Codex review already fires
  # `pull_request_review`, and each of its N inline notes ADDITIONALLY fired a
  # gate run that concurrency mostly cancelled after the runner had started — pure
  # cost. Manual re-check / external-dispatch entry point below: the watchdog
  # sweep and the silent-sync grace DISPATCH INTO this with a `pr_number` input +
  # ref = the PR head branch, so the fresh run's head_sha == pr.head.sha and its
  # check lands on the head where merge-bot looks.
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to check (used by the watchdog sweep + manual re-check)'
        required: false
        type: string

# fix #12/#17/#25: collapse the burst of redundant gate runs per PR without ever
# killing a run mid-verdict. Post-#25 a Codex review fires ONE pull_request_review
# and a push fires ONE pull_request run — the per-inline-note trigger AND the
# in-run self-rerun poll are gone, so a wave is far smaller than the old ~4 runs.
# cancel-in-progress is FALSE (fix #17): an IN-PROGRESS run always runs to
# completion. Under cancel-in-progress: true a run that had already read Codex's
# 👍 and CREATED the green codex-gate-verdict tile got cancelled by a newer event
# BEFORE the job concluded — leaving the authoritative `check-codex-status` job
# check as `cancelled` on the head, which merge-bot treated as failed and stranded
# a green PR (INCIDENT 1). Letting runs finish removes that half-run strand.
# GitHub still collapses the QUEUE per group (at most one pending run; a superseded
# pending run is dropped before it starts), so event bursts don't storm — they just
# don't cancel the run already executing. Any `cancelled` check-runs left behind by
# a superseded QUEUED run are ignored by merge-bot (fix #17 Part B filters them).
# The `|| github.run_id` fallback guarantees a non-empty group key.
concurrency:
  group: codex-gate-pr-${{ github.event.pull_request.number || github.event.inputs.pr_number || github.event.issue.number || github.run_id }}
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: read
  issues: read
  # fix #25: `actions:` dropped — the only consumer was the deleted self-rerun
  # poll (getWorkflowRun/listWorkflowRuns read + createWorkflowDispatch write).
  # fix #11: publish the explicit `check-codex-status` check-run with output text.
  checks: write

jobs:
  # fix #15: GitHub's 2025-03-31 policy forbids a workflow's GITHUB_TOKEN from
  # UPDATING the status/conclusion of a check-run created by a DIFFERENT Actions
  # run ("Check run status and conclusions can only be updated internally by
  # GitHub Actions"). So find→update publishing jams the gate red on the 2nd run
  # for a head (🟡 first, then Codex reviews → the update is rejected). The
  # authoritative `check-codex-status` is therefore the ACTIONS-OWNED job-status
  # check (this job's `name:`), driven ONLY by the verdict via core.setFailed;
  # it lands on pr.head.sha (where merge-bot reads it) on every head-run.
  # The rich 🟢/🔴/🟡 output lives on a SEPARATE, cosmetic, CREATE-ONLY check
  # `codex-gate-verdict` (publishGateCheck below) — never updated, so the policy
  # can't jam it, and nothing keys on that name.
  codex-gate:
    name: check-codex-status
    runs-on: ubuntu-latest
    steps:
      - name: Resolve PR number(s) to check
        id: prs
        uses: actions/github-script@v7
        with:
          script: |
            // pull_request → the PR being opened/synced
            // pull_request_review → context.payload.pull_request
            // pull_request_review_comment → context.payload.pull_request
            // issue_comment → context.payload.issue (PRs are issues for
            //   the comments API)
            // workflow_dispatch (self-rerun / manual) → no PR payload at all,
            //   the PR number comes through as an input; parse it back
            //   into a JS number so downstream filters compare correctly.
            let prNumbers = [];

            if (context.payload.pull_request) {
              prNumbers = [context.payload.pull_request.number];
            } else if (context.payload.issue?.pull_request) {
              prNumbers = [context.payload.issue.number];
            } else if (
              context.eventName === 'pull_request_review_comment' &&
              context.payload.pull_request
            ) {
              prNumbers = [context.payload.pull_request.number];
            } else if (
              context.eventName === 'workflow_dispatch' &&
              context.payload.inputs?.pr_number
            ) {
              prNumbers = [parseInt(context.payload.inputs.pr_number, 10)];
            }

            core.setOutput('numbers', JSON.stringify(prNumbers));

      - name: Evaluate Codex P1 status for each PR
        if: steps.prs.outputs.numbers != '[]'
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumbers = JSON.parse('${{ steps.prs.outputs.numbers }}');

            // fix #21: trusted-sync grace-green. A sync PR is a byte-copy of an
            // upstream automation-core main that already passed our full validation;
            // Codex engages on syncs inconsistently and SILENCE is not a finding, so
            // a trusted sync with zero Codex signals auto-clears after a grace window.
            const SYNC_GRACE_MINUTES = 30;
            // Trusted-sync predicate — must match merge-bot.yml / codex-gate.yml — keep in sync.
            const SYNC_TITLE_PREFIX = 'chore(automation): sync from automation-core';
            const SYNC_BRANCH = 'chore/sync-automation-core';   // branch the sync workflow opens
            const OWNER_LOGIN = 'funzi7';
            const isTrustedSync = (pr) => {
              const titleIsSync = (pr.title || '').startsWith(SYNC_TITLE_PREFIX);
              const sameRepo = !!(pr.head && pr.head.repo && pr.head.repo.full_name === `${owner}/${repo}`);
              return titleIsSync && (
                (pr.user && pr.user.login === OWNER_LOGIN) ||
                ((pr.head && pr.head.ref === SYNC_BRANCH) && sameRepo)
              );
            };

            const isCodex = (user) =>
              user?.login === 'chatgpt-codex-connector[bot]' ||
              user?.login === 'codex' ||
              (user?.type === 'Bot' && user?.login?.toLowerCase().includes('codex'));

            // Codex marks P1 findings exactly two ways (SAME detection as
            // the bridge — do not invent a new pattern):
            //   - "P1-orange" image-badge URL fragment (appears anywhere
            //     in the body — the badge can be inline)
            //   - A line-leading severity label after optional markdown
            //     line-prefixes (whitespace, blockquote >, list markers,
            //     _ * ` # ): **P1**, [P1], or P1:
            // Prose that merely contains the literal token "P1" mid-
            // sentence MUST NOT match — only a real badge or a real
            // line-leading severity label.
            const p1Pattern = /(?:P1-orange|(?:^|\n)[\s>*\-_#`]*(?:\*\*\s*P1\s*\*\*|\[P1\]|P1:))/i;
            // P2 mirrors p1Pattern EXACTLY (badge fragment `P2-yellow` + a
            // line-leading **P2** / [P2] / P2:). This is the SAME marker the
            // bridge keys on for an active P2 — its P2 badge renders as
            // `![P2 Badge](…/badge/P2-yellow…)`, which contains `P2-yellow` —
            // so the gate blocks on precisely the P2s the bridge routes to
            // Claude. Mid-prose "P2" tokens MUST NOT match (same discipline).
            const p2Pattern = /(?:P2-yellow|(?:^|\n)[\s>*\-_#`]*(?:\*\*\s*P2\s*\*\*|\[P2\]|P2:))/i;
            const fixSummaryPattern = /###\s+Summary[\s\S]+commit/i;

            // Codex's own post-fix Summary blocks frequently quote earlier
            // P1 markers verbatim. Strip "## Summary" / "## Testing"
            // sections (## or ###) up to the next same-level heading or a
            // horizontal rule before running p1Pattern, so a fix Summary
            // isn't misread as a fresh P1. fixSummaryPattern still uses the
            // original body — that pattern is looking *for* the Summary.
            function stripSummarySections(body) {
              if (!body) return '';
              return body
                .replace(/(?:^|\n)#{2,3}\s+Summary[\s\S]*?(?=\n#{2,3}\s|\n---|$)/gi, '')
                .replace(/(?:^|\n)#{2,3}\s+Testing[\s\S]*?(?=\n#{2,3}\s|\n---|$)/gi, '');
            }

            let anyBlocked = false;
            const results = [];

            // fix #15: publish the rich 🟢/🔴/🟡 output as a COSMETIC, CREATE-ONLY
            // check named `codex-gate-verdict` (NOT `check-codex-status` — that is
            // the Actions-owned job-status check now). CREATE-ONLY on purpose: the
            // 2025-03-31 policy blocks a token from UPDATING another run's check
            // ("...can only be updated internally by GitHub Actions"), so we never
            // list/find/update — each run just creates a fresh completed check-run.
            // Multiple runs accumulate check-runs of this name; the UI and any
            // latest-per-name reader surface the newest, and merge-bot doesn't key
            // on this name (it reads `check-codex-status`). Purely informational, so
            // a create failure (e.g. downgraded checks:write on forked/Dependabot
            // runs) is logged and NEVER fails the job — the authoritative verdict
            // is the job-status check driven by core.setFailed.
            async function publishGateCheck(headSha, conclusion, title, summary) {
              try {
                await github.rest.checks.create({
                  owner, repo, name: 'codex-gate-verdict', head_sha: headSha,
                  status: 'completed', conclusion,
                  output: { title, summary },
                });
              } catch (e) {
                core.warning(`codex-gate-verdict publish failed (cosmetic, ignored): ${e.message}`);
              }
            }

            for (const prNumber of prNumbers) {
              try {
                const { data: pr } = await github.rest.pulls.get({
                  owner, repo, pull_number: prNumber,
                });
                const headSha = pr.head.sha;
                const head7 = headSha.substring(0, 7);

                // Manual override — admin force-merge.
                if (pr.labels.some(l => l.name === 'codex-p1-acknowledged')) {
                  results.push(`PR #${prNumber}: ✅ override label present`);
                  await publishGateCheck(headSha, 'success', '🟢 Reviewed — clear',
                    `Override label \`codex-p1-acknowledged\` is set on ${head7} — gate forced green.`);
                  continue;
                }

                // Codex feedback across all three channels, fully paginated
                // (the default 30/page silently drops the first Codex review
                // on chatty PRs — the very place a P1 lives).
                const reviews = await github.paginate(github.rest.pulls.listReviews, {
                  owner, repo, pull_number: prNumber, per_page: 100,
                });
                const comments = await github.paginate(github.rest.issues.listComments, {
                  owner, repo, issue_number: prNumber, per_page: 100,
                });
                const reviewComments = await github.paginate(github.rest.pulls.listReviewComments, {
                  owner, repo, pull_number: prNumber, per_page: 100,
                });
                // PR-level reactions — Codex leaves a 👍 here when it has no
                // issues, sometimes WITHOUT any review body. That 👍 is a valid
                // "reviewed, nothing to fix" signal, so it counts. The 👍 fires
                // no event, so the watchdog sweep (fix #18) is what re-dispatches
                // the gate to catch it on the head (fix #25 removed the in-run poll).
                const reactions = await github.paginate(github.rest.reactions.listForIssue, {
                  owner, repo, issue_number: prNumber, per_page: 100,
                });

                const codexReviews = reviews.filter(r => isCodex(r.user));
                const codexComments = comments.filter(c => isCodex(c.user));
                const codexReviewComments = reviewComments.filter(c => isCodex(c.user));
                // fix #21: total Codex signals of ANY kind (any date) — reviews,
                // review comments, issue comments, and issue-level reactions. Zero
                // means Codex never engaged at all (the trusted-sync grace precondition).
                const codexReactions = reactions.filter(r => isCodex(r.user));
                const codexSignalCount =
                  codexReviews.length + codexComments.length +
                  codexReviewComments.length + codexReactions.length;

                const prCommits = await github.paginate(github.rest.pulls.listCommits, {
                  owner, repo, pull_number: prNumber, per_page: 100,
                });
                // latestCommitDate = the MAX committer date across the PR's
                // commits. Don't assume listCommits returns them sorted — take
                // the max explicitly so a P1's "after the latest commit?" test
                // is always against the real newest commit.
                const latestCommitDate = prCommits.length > 0
                  ? new Date(Math.max(...prCommits.map(c => new Date(c.commit.committer.date).getTime())))
                  : new Date(pr.created_at);

                // A Codex signal counts as "on the current head" ONLY if it is
                // DATED AFTER the latest commit. commit_id is deliberately NOT
                // used for freshness: GitHub RE-POINTS a still-applicable inline
                // comment's commit_id to the new head, so commit_id == headSha
                // does NOT mean Codex reviewed the new commit — it can be an old
                // (stale) comment whose line still exists. Using the SAME
                // date-after-latest-commit test for BOTH "has Codex reviewed
                // this head?" and "is there an active P1?" keeps them consistent
                // and stops a re-pointed stale comment from either falsely
                // blocking OR falsely reading as a fresh review (which would
                // flip the gate green before Codex has re-reviewed the new head
                // — the merge-before-review race through a side door).
                const onHead = (date) => !!date && new Date(date) > latestCommitDate;

                const allBodies = [
                  ...codexReviews.map(r => ({
                    body: r.body || '',
                    bodyForP1: stripSummarySections(r.body || ''),
                    date: r.submitted_at,
                    onHead: onHead(r.submitted_at),
                  })),
                  ...codexComments.map(c => ({
                    body: c.body || '',
                    bodyForP1: stripSummarySections(c.body || ''),
                    date: c.created_at,
                    onHead: onHead(c.created_at),
                  })),
                  ...codexReviewComments.map(c => ({
                    body: c.body || '',
                    bodyForP1: stripSummarySections(c.body || ''),
                    date: c.created_at,
                    onHead: onHead(c.created_at),
                  })),
                ].sort((a, b) => new Date(a.date) - new Date(b.date));

                // A 👍 reaction counts as "reviewed, no issues" ONLY if it is
                // dated after the latest commit (Codex must react on the NEW
                // head). The 👍 fires no event, so the watchdog sweep catches it.
                const codexThumbsUpOnHead = reactions.some(
                  r => isCodex(r.user) && r.content === '+1' &&
                       new Date(r.created_at) > latestCommitDate
                );

                // Has Codex actually reviewed the CURRENT head? = any Codex
                // signal (review / comment / inline / 👍) DATED after the latest
                // commit. Date-only, same basis as activeSevItems below.
                const hasCodexSignalOnHead =
                  allBodies.some(item => item.onHead) || codexThumbsUpOnHead;

                // ACTIVE P1/P2 = a P1 OR P2 marker DATED after the latest
                // commit. The gate must block on BOTH severities: the bridge
                // sends a Claude fix on P1 AND P2, so blocking on P1 only let a
                // P2-no-P1 PR merge BEFORE the fix landed — the merge-before-fix
                // race Codex flagged on #48. (bodyForP1 is the Summary-stripped
                // body; stripping is severity-agnostic, so it's reused for P2.)
                const activeSevItems = allBodies.filter(
                  item => item.onHead &&
                    (p1Pattern.test(item.bodyForP1) || p2Pattern.test(item.bodyForP1))
                );

                // 1) Active P1/P2 → block unless a later fix Summary cleared it.
                if (activeSevItems.length > 0) {
                  let lastActiveSevDate = null;
                  let lastFixDate = null;
                  for (const item of allBodies) {
                    if (!item.onHead) continue;
                    if (p1Pattern.test(item.bodyForP1) || p2Pattern.test(item.bodyForP1)) lastActiveSevDate = item.date;
                    if (fixSummaryPattern.test(item.body)) lastFixDate = item.date;
                  }
                  if (lastFixDate && new Date(lastFixDate) > new Date(lastActiveSevDate)) {
                    results.push(`PR #${prNumber}: ✅ active Codex P1/P2 followed by a fix Summary`);
                    await publishGateCheck(headSha, 'success', '🟢 Reviewed — clear',
                      `Codex's P1/P2 on ${head7} was followed by a fix Summary — resolved, no active P1/P2.`);
                    continue;
                  }
                  results.push(
                    `PR #${prNumber}: ❌ active Codex P1/P2 unresolved (last active: ${lastActiveSevDate}, last fix: ${lastFixDate || 'none'}, head: ${headSha.substring(0, 7)})`
                  );
                  await publishGateCheck(headSha, 'failure', '🔴 Active Codex P1/P2',
                    `An unresolved Codex P1/P2 on ${head7} is blocking merge. It clears when Codex posts a fix Summary or the head is updated (last active ${lastActiveSevDate}, last fix ${lastFixDate || 'none'}).`);
                  anyBlocked = true;
                  continue;
                }

                // 2) No active P1, but Codex hasn't reviewed the head yet →
                // PENDING block. (fix #25: no in-run poll — a late 👍 is caught by
                // the watchdog sweep, a silent trusted sync by grace-green below.)
                if (!hasCodexSignalOnHead) {
                  // fix #21: trusted-sync grace-green. Fires ONLY inside this
                  // zero-signal 🟡 branch, ONLY for a trusted sync with ZERO Codex
                  // signals of any kind, ONLY once the head is older than the grace
                  // window. Any Codex signal (even one) → codexSignalCount > 0 → this
                  // never fires and the normal rules apply (P1/P2 still blocks, a
                  // clean review / 👍 still greens, a younger-than-grace silent sync
                  // stays 🟡).
                  const graceMs = SYNC_GRACE_MINUTES * 60 * 1000;
                  const headAgeMs = Date.now() - latestCommitDate.getTime();
                  const silentTrustedSync = isTrustedSync(pr) && codexSignalCount === 0;
                  if (silentTrustedSync && headAgeMs > graceMs) {
                    results.push(
                      `PR #${prNumber}: ✅ trusted sync — no Codex signal within ${SYNC_GRACE_MINUTES}m grace on head ${head7}; auto-cleared`
                    );
                    await publishGateCheck(headSha, 'success', '🟢 Trusted sync — no Codex findings within grace window',
                      `Byte-copy sync from automation-core (validated upstream). Codex posted no signal within ${SYNC_GRACE_MINUTES} min of head ${head7}, so the gate auto-cleared. Any Codex signal of any kind restores normal rules.`);
                    continue;
                  }
                  // Still-pending. For a silent trusted sync inside the grace window,
                  // tell the reader exactly when it auto-clears.
                  const graceLine = silentTrustedSync
                    ? `\nTrusted sync: auto-clears at ${new Date(latestCommitDate.getTime() + graceMs).toISOString()} if Codex posts nothing.`
                    : '';
                  results.push(
                    `PR #${prNumber}: ⏳ pending — Codex hasn't reviewed head ${headSha.substring(0, 7)} yet; blocking until it does`
                  );
                  await publishGateCheck(headSha, 'failure', '🟡 Waiting for Codex review',
                    `Codex hasn't reviewed ${head7} yet. The gate re-checks on Codex activity and on the watchdog sweep (≤~1h); manual re-check: Actions → Codex Gate → Run workflow with this PR number, or add the \`codex-p1-acknowledged\` label.${graceLine}`);
                  anyBlocked = true;
                  continue;
                }

                // 3) Codex reviewed the head and found no active P1 → GREEN.
                if (codexThumbsUpOnHead && allBodies.every(item => !item.onHead)) {
                  results.push(`PR #${prNumber}: ✅ Codex reacted 👍 on the head — no issues`);
                } else if (allBodies.some(item => p1Pattern.test(item.bodyForP1) || p2Pattern.test(item.bodyForP1))) {
                  results.push(
                    `PR #${prNumber}: ✅ Codex reviewed head ${headSha.substring(0, 7)} — P1/P2(s) are stale (predate the latest commit)`
                  );
                } else {
                  results.push(`PR #${prNumber}: ✅ Codex reviewed head ${headSha.substring(0, 7)} — no P1/P2`);
                }
                await publishGateCheck(headSha, 'success', '🟢 Reviewed — clear',
                  `Codex reviewed ${head7} with no active P1/P2.`);
              } catch (err) {
                // fail-soft: a TECHNICAL failure (API hiccup, rate limit, etc.)
                // must NEVER wedge a PR red forever. We did not detect a P1
                // here, so do not block — log loudly instead. A real P1 is only
                // ever detected by the pattern above, which blocks; this branch
                // only fires on genuine exceptions.
                results.push(
                  `PR #${prNumber}: ⚠️ gate errored technically — not blocking (fail-soft): ${err.message}`
                );
                core.warning(`Codex Gate technical error on PR #${prNumber}: ${err.stack || err.message}`);
              }
            }

            core.summary.addHeading('Codex Gate Results').addList(results).write();
            results.forEach(r => core.info(r));

            // fix #14: fail the `codex-gate` job CLOSED when the verdict blocks
            // OR the explicit `check-codex-status` publish failed. Succeed only
            // when the verdict is clear AND the check actually published — so a
            // downgraded-token run (missing required check) is a VISIBLE red
            // `codex-gate`, never a green job hiding an unmergeable PR.
            // fix #15: the job conclusion IS the authoritative `check-codex-status`
            // (this job's name), so it must equal the VERDICT only — never coupled
            // to the cosmetic `codex-gate-verdict` publish.
            if (anyBlocked) {
              core.setFailed(
                'Blocked by Codex Gate: an active P1 or P2 is unresolved, or Codex has not reviewed the current head yet.\n' +
                'Resolve by one of:\n' +
                '  1. Wait — Codex reviews automatically on every push; the gate re-checks on Codex activity and on the watchdog sweep (≤~1h), and goes green once Codex posts any signal with no active P1/P2.\n' +
                '  2. Push a fix commit — P1/P2s raised before it become stale and clear automatically.\n' +
                '  3. Add label "codex-p1-acknowledged" to override.'
              );
            }
