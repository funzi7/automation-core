name: Codex Gate

# Blocking status check `check-codex-status`. Blocks a PR merge ONLY when
# Codex has an ACTIVE P1 finding on the current head commit. Everything
# else is GREEN: a clean review, P2-only feedback, a 👍, a stale P1 (raised
# before the latest commit), an active P1 already followed by a Codex fix
# Summary, or no Codex comments at all.
#
# Deliberately P1-only and consistent with the bridge (codex-auto-fix.yml,
# post-PR #21): only a P1 blocks / triggers a fix; P2 is advisory. There is
# NO "approval marker" requirement — absence of an active P1 is GREEN, not
# "blocked until Codex explicitly approves".
#
# Why this changed (the bug it fixes): the old gate required an explicit
# Codex signal dated AFTER the latest commit to pass. When Codex left only
# a 👍 reaction (not counted as a textual signal) or its review timestamp
# wasn't strictly after the commit's committer date, the gate fell through
# to "waiting for re-review" and stayed RED until a 5-attempt timeout —
# forcing a manual merge on every clean PR (e.g. PR #24: 👍, zero comments,
# still blocked). The wait/self-rerun loop is gone.
#
# Trade-off this accepts: the gate no longer waits for Codex's FIRST
# review. A brand-new PR with no Codex comment yet evaluates as "no active
# P1" → green, so merge-bot could merge before Codex weighs in (the old
# #66/#67 race). This is intentional per the P1-only design; if a P1 lands
# later, the next event flips the check red. Re-tighten via a short
# "wait-for-first-review" window if that race resurfaces.
#
# How it decides, per PR:
#   active P1 (P1 marker dated after the latest commit, not followed by a
#     later Codex fix Summary)             → ❌ setFailed (blocked)
#   no active P1 (clean / P2 / 👍 / stale
#     P1 / no comments)                    → ✅ success (green)
#   label "codex-p1-acknowledged"          → ✅ success (manual override)
#   technical error evaluating a PR        → ✅ not blocked (fail-soft: never
#                                               wedge a PR red on an API hiccup)
#
# The gate re-evaluates automatically whenever Codex posts (the
# pull_request_review / _review_comment / issue_comment triggers) and on
# every new push (pull_request: synchronize), so a P1 that lands after a
# green check flips it red on the next event.

on:
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_review:
    types: [submitted, edited, dismissed]
  pull_request_review_comment:
    types: [created, edited, deleted]
  issue_comment:
    types: [created, edited, deleted]
  # Manual re-check entry point: dispatch with a pr_number input to
  # re-evaluate a specific PR (handy after acknowledging a P1 by hand).
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to check'
        required: false
        type: string

permissions:
  contents: read
  pull-requests: read
  issues: read

jobs:
  check-codex-status:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve PR number(s) to check
        id: prs
        uses: actions/github-script@v7
        with:
          script: |
            // pull_request → the PR being opened/synced
            // pull_request_review → context.payload.pull_request
            // pull_request_review_comment → context.payload.pull_request
            // issue_comment → context.payload.issue (PRs are issues for
            //   the comments API)
            // workflow_dispatch (manual re-check) → no PR payload at all,
            //   the PR number comes through as an input; parse it back
            //   into a JS number so downstream filters compare correctly.
            let prNumbers = [];

            if (context.payload.pull_request) {
              prNumbers = [context.payload.pull_request.number];
            } else if (context.payload.issue?.pull_request) {
              prNumbers = [context.payload.issue.number];
            } else if (
              context.eventName === 'pull_request_review_comment' &&
              context.payload.pull_request
            ) {
              prNumbers = [context.payload.pull_request.number];
            } else if (
              context.eventName === 'workflow_dispatch' &&
              context.payload.inputs?.pr_number
            ) {
              prNumbers = [parseInt(context.payload.inputs.pr_number, 10)];
            }

            core.setOutput('numbers', JSON.stringify(prNumbers));

      - name: Evaluate Codex P1 status for each PR
        if: steps.prs.outputs.numbers != '[]'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumbers = JSON.parse('${{ steps.prs.outputs.numbers }}');

            const isCodex = (user) =>
              user?.login === 'chatgpt-codex-connector[bot]' ||
              user?.login === 'codex' ||
              (user?.type === 'Bot' && user?.login?.toLowerCase().includes('codex'));

            // Codex marks P1 findings exactly two ways (SAME detection as
            // the bridge — do not invent a new pattern):
            //   - "P1-orange" image-badge URL fragment (appears anywhere
            //     in the body — the badge can be inline)
            //   - A line-leading severity label after optional markdown
            //     line-prefixes (whitespace, blockquote >, list markers,
            //     _ * ` # ): **P1**, [P1], or P1:
            // Prose that merely contains the literal token "P1" mid-
            // sentence MUST NOT match — only a real badge or a real
            // line-leading severity label.
            const p1Pattern = /(?:P1-orange|(?:^|\n)[\s>*\-_#`]*(?:\*\*\s*P1\s*\*\*|\[P1\]|P1:))/i;
            const fixSummaryPattern = /###\s+Summary[\s\S]+commit/i;

            // Codex's own post-fix Summary blocks frequently quote earlier
            // P1 markers verbatim. Strip "## Summary" / "## Testing"
            // sections (## or ###) up to the next same-level heading or a
            // horizontal rule before running p1Pattern, so a fix Summary
            // isn't misread as a fresh P1. fixSummaryPattern still uses the
            // original body — that pattern is looking *for* the Summary.
            function stripSummarySections(body) {
              if (!body) return '';
              return body
                .replace(/(?:^|\n)#{2,3}\s+Summary[\s\S]*?(?=\n#{2,3}\s|\n---|$)/gi, '')
                .replace(/(?:^|\n)#{2,3}\s+Testing[\s\S]*?(?=\n#{2,3}\s|\n---|$)/gi, '');
            }

            // Block the job if ANY PR has an active, unresolved P1.
            let anyBlocked = false;
            const results = [];

            for (const prNumber of prNumbers) {
              try {
                const { data: pr } = await github.rest.pulls.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber,
                });

                // Manual override — admin force-merge.
                if (pr.labels.some(l => l.name === 'codex-p1-acknowledged')) {
                  results.push(`PR #${prNumber}: ✅ override label present`);
                  continue;
                }

                // Codex feedback across all three channels, fully
                // paginated (the default 30/page silently drops the first
                // Codex review on chatty PRs — the very place a P1 lives).
                const reviews = await github.paginate(github.rest.pulls.listReviews, {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber,
                  per_page: 100,
                });
                const comments = await github.paginate(github.rest.issues.listComments, {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  per_page: 100,
                });
                const reviewComments = await github.paginate(github.rest.pulls.listReviewComments, {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber,
                  per_page: 100,
                });

                const codexReviews = reviews.filter(r => isCodex(r.user));
                const codexComments = comments.filter(c => isCodex(c.user));
                const codexReviewComments = reviewComments.filter(c => isCodex(c.user));

                // bodyForP1 = body with Summary/Testing stripped (used for
                // p1Pattern). body stays intact for fixSummaryPattern.
                const allBodies = [
                  ...codexReviews.map(r => ({
                    body: r.body || '',
                    bodyForP1: stripSummarySections(r.body || ''),
                    date: r.submitted_at,
                  })),
                  ...codexComments.map(c => ({
                    body: c.body || '',
                    bodyForP1: stripSummarySections(c.body || ''),
                    date: c.created_at,
                  })),
                  ...codexReviewComments.map(c => ({
                    body: c.body || '',
                    bodyForP1: stripSummarySections(c.body || ''),
                    date: c.created_at,
                  })),
                ].sort((a, b) => new Date(a.date) - new Date(b.date));

                // Latest commit on the head. A P1 dated at/before this is
                // STALE — the new commit is presumed to address it — so it
                // does NOT block. Only a P1 dated AFTER the latest commit
                // is "active".
                const prCommits = await github.paginate(github.rest.pulls.listCommits, {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber,
                  per_page: 100,
                });
                const latestCommitDate = prCommits.length > 0
                  ? new Date(prCommits[prCommits.length - 1].commit.committer.date)
                  : new Date(pr.created_at);

                const activeP1Items = allBodies.filter(
                  item => p1Pattern.test(item.bodyForP1) && new Date(item.date) > latestCommitDate
                );

                // NO ACTIVE P1 → GREEN. This is the whole point of the fix:
                // a clean review, P2-only, a 👍, a stale P1, or no Codex
                // comments at all are all green. No "approval marker" needed.
                if (activeP1Items.length === 0) {
                  const hadAnyP1 = allBodies.some(item => p1Pattern.test(item.bodyForP1));
                  if (hadAnyP1) {
                    results.push(
                      `PR #${prNumber}: ✅ no ACTIVE P1 (P1(s) predate the latest commit at ${latestCommitDate.toISOString()} — stale)`
                    );
                  } else if (allBodies.length > 0) {
                    results.push(`PR #${prNumber}: ✅ Codex reviewed — no P1`);
                  } else {
                    results.push(`PR #${prNumber}: ✅ no Codex P1 (no Codex comments on this PR)`);
                  }
                  continue;
                }

                // Active P1 found — was it followed by a Codex fix Summary
                // (both after latestCommitDate)? If the latest fix Summary
                // is newer than the latest active P1, treat it as resolved.
                let lastActiveP1Date = null;
                let lastFixDate = null;
                for (const item of allBodies) {
                  if (new Date(item.date) <= latestCommitDate) continue;
                  if (p1Pattern.test(item.bodyForP1)) lastActiveP1Date = item.date;
                  if (fixSummaryPattern.test(item.body)) lastFixDate = item.date;
                }

                if (lastFixDate && new Date(lastFixDate) > new Date(lastActiveP1Date)) {
                  results.push(`PR #${prNumber}: ✅ active Codex P1 followed by a fix Summary`);
                  continue;
                }

                // Active, unresolved P1 → BLOCK. Safety wins on a real P1.
                results.push(
                  `PR #${prNumber}: ❌ active Codex P1 unresolved (last active P1: ${lastActiveP1Date}, last fix: ${lastFixDate || 'none'}, latest commit: ${latestCommitDate.toISOString()})`
                );
                anyBlocked = true;
              } catch (err) {
                // fail-soft: a TECHNICAL failure (API hiccup, rate limit,
                // etc.) must NEVER wedge a PR red forever. We did not detect
                // a P1 here, so do not block — log loudly instead. A real
                // P1 is only ever detected by the pattern above, which
                // blocks; this branch only fires on genuine exceptions.
                results.push(
                  `PR #${prNumber}: ⚠️ gate errored technically — not blocking (fail-soft): ${err.message}`
                );
                core.warning(`Codex Gate technical error on PR #${prNumber}: ${err.stack || err.message}`);
              }
            }

            core.summary.addHeading('Codex Gate Results').addList(results).write();
            results.forEach(r => core.info(r));

            if (anyBlocked) {
              core.setFailed(
                'Blocked: an ACTIVE Codex P1 is unresolved on the current head.\n' +
                'Resolve by one of:\n' +
                '  1. Push a fix commit — P1s raised before it become stale and clear automatically.\n' +
                '  2. Let Codex post a fix Summary after the P1.\n' +
                '  3. Add label "codex-p1-acknowledged" to override.'
              );
            }
