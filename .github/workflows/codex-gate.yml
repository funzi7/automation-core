name: Codex Gate

# Blocking status check `check-codex-status`. Two conditions must BOTH hold
# for a PR to go GREEN:
#   1. Codex has REVIEWED the current head commit — ANY signal: a review
#      object, an inline note, a top-level comment, or a 👍 reaction on the
#      head. This is "wait for first review", NOT "wait for approval": the
#      moment Codex leaves any signal with no active P1, the gate is green.
#   2. There is no ACTIVE P1 on the current head (a P1 marker on the head,
#      not yet followed by a later Codex fix Summary).
#
# So the gate BLOCKS when either an active P1 is unresolved OR Codex has not
# reviewed the current head yet (pending). Everything else is GREEN: a clean
# review, P2-only, a 👍, or a stale P1 (raised before the latest commit).
# `codex-p1-acknowledged` label = manual override.
#
# P1-only and consistent with the bridge (codex-auto-fix.yml, post-PR #21):
# only a P1 blocks / triggers a fix; P2 is advisory.
#
# Why this can't wedge red forever (unlike the original gate): the old gate
# demanded an explicit post-commit *approval marker* and never counted the
# 👍 reaction, so a clean PR (PR #24: 👍 + zero comments) stayed red until a
# timeout. Here ANY Codex signal on the head clears it — and Codex reviews
# automatically on every push, so the wait is short. "On the head" is
# detected by commit_id == head SHA (robust to clock skew) OR a timestamp
# after the latest commit, so a real review is never missed. If Codex truly
# never reviews, the escape hatch is the override label, not a timeout.
#
# P1 detection is the SAME as the bridge (p1Pattern / stripSummarySections)
# across the same 3 channels (reviews + top-level comments + inline review
# comments), fully paginated. fail-soft: a technical error evaluating a PR
# does NOT block; a detected P1 always blocks (safety wins).
#
# Re-evaluates on every Codex post (pull_request_review / _review_comment /
# issue_comment) and every push (pull_request: synchronize), so pending →
# green happens on the next event — no self-rerun loop needed.

on:
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_review:
    types: [submitted, edited, dismissed]
  pull_request_review_comment:
    types: [created, edited, deleted]
  issue_comment:
    types: [created, edited, deleted]
  # Manual re-check entry point: dispatch with a pr_number input to
  # re-evaluate a specific PR (handy after acknowledging a P1 by hand).
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to check'
        required: false
        type: string

permissions:
  contents: read
  pull-requests: read
  issues: read

jobs:
  check-codex-status:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve PR number(s) to check
        id: prs
        uses: actions/github-script@v7
        with:
          script: |
            // pull_request → the PR being opened/synced
            // pull_request_review → context.payload.pull_request
            // pull_request_review_comment → context.payload.pull_request
            // issue_comment → context.payload.issue (PRs are issues for
            //   the comments API)
            // workflow_dispatch (manual re-check) → no PR payload at all,
            //   the PR number comes through as an input; parse it back
            //   into a JS number so downstream filters compare correctly.
            let prNumbers = [];

            if (context.payload.pull_request) {
              prNumbers = [context.payload.pull_request.number];
            } else if (context.payload.issue?.pull_request) {
              prNumbers = [context.payload.issue.number];
            } else if (
              context.eventName === 'pull_request_review_comment' &&
              context.payload.pull_request
            ) {
              prNumbers = [context.payload.pull_request.number];
            } else if (
              context.eventName === 'workflow_dispatch' &&
              context.payload.inputs?.pr_number
            ) {
              prNumbers = [parseInt(context.payload.inputs.pr_number, 10)];
            }

            core.setOutput('numbers', JSON.stringify(prNumbers));

      - name: Evaluate Codex P1 status for each PR
        if: steps.prs.outputs.numbers != '[]'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumbers = JSON.parse('${{ steps.prs.outputs.numbers }}');

            const isCodex = (user) =>
              user?.login === 'chatgpt-codex-connector[bot]' ||
              user?.login === 'codex' ||
              (user?.type === 'Bot' && user?.login?.toLowerCase().includes('codex'));

            // Codex marks P1 findings exactly two ways (SAME detection as
            // the bridge — do not invent a new pattern):
            //   - "P1-orange" image-badge URL fragment (appears anywhere
            //     in the body — the badge can be inline)
            //   - A line-leading severity label after optional markdown
            //     line-prefixes (whitespace, blockquote >, list markers,
            //     _ * ` # ): **P1**, [P1], or P1:
            // Prose that merely contains the literal token "P1" mid-
            // sentence MUST NOT match — only a real badge or a real
            // line-leading severity label.
            const p1Pattern = /(?:P1-orange|(?:^|\n)[\s>*\-_#`]*(?:\*\*\s*P1\s*\*\*|\[P1\]|P1:))/i;
            const fixSummaryPattern = /###\s+Summary[\s\S]+commit/i;

            // Codex's own post-fix Summary blocks frequently quote earlier
            // P1 markers verbatim. Strip "## Summary" / "## Testing"
            // sections (## or ###) up to the next same-level heading or a
            // horizontal rule before running p1Pattern, so a fix Summary
            // isn't misread as a fresh P1. fixSummaryPattern still uses the
            // original body — that pattern is looking *for* the Summary.
            function stripSummarySections(body) {
              if (!body) return '';
              return body
                .replace(/(?:^|\n)#{2,3}\s+Summary[\s\S]*?(?=\n#{2,3}\s|\n---|$)/gi, '')
                .replace(/(?:^|\n)#{2,3}\s+Testing[\s\S]*?(?=\n#{2,3}\s|\n---|$)/gi, '');
            }

            // Block the job if ANY PR is blocked (active P1, or pending review).
            let anyBlocked = false;
            const results = [];

            for (const prNumber of prNumbers) {
              try {
                const { data: pr } = await github.rest.pulls.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber,
                });
                const headSha = pr.head.sha;

                // Manual override — admin force-merge.
                if (pr.labels.some(l => l.name === 'codex-p1-acknowledged')) {
                  results.push(`PR #${prNumber}: ✅ override label present`);
                  continue;
                }

                // Codex feedback across all three channels, fully
                // paginated (the default 30/page silently drops the first
                // Codex review on chatty PRs — the very place a P1 lives).
                const reviews = await github.paginate(github.rest.pulls.listReviews, {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber,
                  per_page: 100,
                });
                const comments = await github.paginate(github.rest.issues.listComments, {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  per_page: 100,
                });
                const reviewComments = await github.paginate(github.rest.pulls.listReviewComments, {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber,
                  per_page: 100,
                });
                // PR-level reactions — Codex leaves a 👍 here when it has
                // no issues, sometimes WITHOUT any review body. That 👍 is a
                // valid "reviewed, nothing to fix" signal, so it counts.
                const reactions = await github.paginate(github.rest.reactions.listForIssue, {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  per_page: 100,
                });

                const codexReviews = reviews.filter(r => isCodex(r.user));
                const codexComments = comments.filter(c => isCodex(c.user));
                const codexReviewComments = reviewComments.filter(c => isCodex(c.user));

                // Latest commit on the head.
                const prCommits = await github.paginate(github.rest.pulls.listCommits, {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber,
                  per_page: 100,
                });
                const latestCommitDate = prCommits.length > 0
                  ? new Date(prCommits[prCommits.length - 1].commit.committer.date)
                  : new Date(pr.created_at);

                // An item is "on the current head" if it was submitted
                // against the head SHA (exact — robust to clock skew) OR it
                // is dated after the latest commit. Reviews + inline review
                // comments carry commit_id; top-level issue comments don't,
                // so those use the date test only. Used for BOTH the
                // "has Codex reviewed the head?" check and the active-P1
                // check, so the two stay consistent (and a doubtful P1 errs
                // toward blocking — safety wins).
                const onHead = (date, commitId) =>
                  (!!commitId && commitId === headSha) ||
                  (!!date && new Date(date) > latestCommitDate);

                // bodyForP1 = body with Summary/Testing stripped (used for
                // p1Pattern). body stays intact for fixSummaryPattern.
                const allBodies = [
                  ...codexReviews.map(r => ({
                    body: r.body || '',
                    bodyForP1: stripSummarySections(r.body || ''),
                    date: r.submitted_at,
                    onHead: onHead(r.submitted_at, r.commit_id),
                  })),
                  ...codexComments.map(c => ({
                    body: c.body || '',
                    bodyForP1: stripSummarySections(c.body || ''),
                    date: c.created_at,
                    onHead: onHead(c.created_at, null),
                  })),
                  ...codexReviewComments.map(c => ({
                    body: c.body || '',
                    bodyForP1: stripSummarySections(c.body || ''),
                    date: c.created_at,
                    onHead: onHead(c.created_at, c.commit_id),
                  })),
                ].sort((a, b) => new Date(a.date) - new Date(b.date));

                const codexThumbsUpOnHead = reactions.some(
                  r => isCodex(r.user) && r.content === '+1' &&
                       new Date(r.created_at) > latestCommitDate
                );

                // Has Codex looked at the CURRENT head at all (any channel)?
                // This is the "first review" signal — NOT an approval. A
                // review object on the head (even empty/👍) counts.
                const hasCodexSignalOnHead =
                  allBodies.some(item => item.onHead) || codexThumbsUpOnHead;

                // Active P1 = a P1 marker on the current head.
                const activeP1Items = allBodies.filter(
                  item => item.onHead && p1Pattern.test(item.bodyForP1)
                );

                // 1) Active P1 → block unless a later fix Summary cleared it.
                if (activeP1Items.length > 0) {
                  let lastActiveP1Date = null;
                  let lastFixDate = null;
                  for (const item of allBodies) {
                    if (!item.onHead) continue;
                    if (p1Pattern.test(item.bodyForP1)) lastActiveP1Date = item.date;
                    if (fixSummaryPattern.test(item.body)) lastFixDate = item.date;
                  }
                  if (lastFixDate && new Date(lastFixDate) > new Date(lastActiveP1Date)) {
                    results.push(`PR #${prNumber}: ✅ active Codex P1 followed by a fix Summary`);
                    continue;
                  }
                  results.push(
                    `PR #${prNumber}: ❌ active Codex P1 unresolved (last active P1: ${lastActiveP1Date}, last fix: ${lastFixDate || 'none'}, head: ${headSha.substring(0, 7)})`
                  );
                  anyBlocked = true;
                  continue;
                }

                // 2) No active P1, but Codex hasn't reviewed the current head
                // yet → PENDING block (wait-for-first-review). This is the
                // anti-#66/#67-race guard. It is NOT an approval wait: ANY
                // Codex signal on the head (a review object, inline note,
                // top-level comment, or 👍) flips this green on the next
                // event, and Codex reviews automatically on every push — so
                // it clears in a minute or two, never indefinitely. If Codex
                // genuinely never reviews, use the override label.
                if (!hasCodexSignalOnHead) {
                  results.push(
                    `PR #${prNumber}: ⏳ pending — Codex hasn't reviewed head ${headSha.substring(0, 7)} yet; blocking until it does (no approval needed, just a first signal)`
                  );
                  anyBlocked = true;
                  continue;
                }

                // 3) Codex reviewed the head and found no active P1 → GREEN.
                const hadAnyP1 = allBodies.some(item => p1Pattern.test(item.bodyForP1));
                if (hadAnyP1) {
                  results.push(
                    `PR #${prNumber}: ✅ Codex reviewed head ${headSha.substring(0, 7)} — P1(s) are stale (predate the latest commit)`
                  );
                } else if (codexThumbsUpOnHead && allBodies.every(item => !item.onHead)) {
                  results.push(`PR #${prNumber}: ✅ Codex reacted 👍 on the head — no issues`);
                } else {
                  results.push(`PR #${prNumber}: ✅ Codex reviewed head ${headSha.substring(0, 7)} — no P1`);
                }
              } catch (err) {
                // fail-soft: a TECHNICAL failure (API hiccup, rate limit,
                // etc.) must NEVER wedge a PR red forever. We did not detect
                // a P1 here, so do not block — log loudly instead. A real
                // P1 is only ever detected by the pattern above, which
                // blocks; this branch only fires on genuine exceptions.
                results.push(
                  `PR #${prNumber}: ⚠️ gate errored technically — not blocking (fail-soft): ${err.message}`
                );
                core.warning(`Codex Gate technical error on PR #${prNumber}: ${err.stack || err.message}`);
              }
            }

            core.summary.addHeading('Codex Gate Results').addList(results).write();
            results.forEach(r => core.info(r));

            if (anyBlocked) {
              core.setFailed(
                'Blocked by Codex Gate: an active P1 is unresolved, or Codex has not reviewed the current head yet.\n' +
                'Resolve by one of:\n' +
                '  1. Wait — Codex reviews automatically on every push; the gate goes green once Codex posts any signal with no P1 (it re-runs on that event).\n' +
                '  2. Push a fix commit — P1s raised before it become stale and clear automatically.\n' +
                '  3. Add label "codex-p1-acknowledged" to override.'
              );
            }
