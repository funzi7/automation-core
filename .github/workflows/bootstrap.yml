name: Bootstrap repos

# Onboards funzi7's repos into the self-healing loop by opening a PR that
# installs template/sync-automation-core.yml (the per-repo daily sync). After
# that PR is merged, the daily sync brings the rest of the loop workflows.
#
# Two ways it runs:
#   - schedule (weekly): AUTO-ENROLLMENT. Sweeps every eligible repo and opens
#     an onboarding PR in any that isn't enrolled yet. It only ever OPENS a PR
#     — it NEVER merges. Each PR is the human checkpoint (auto-propose, not
#     auto-apply), so a brand-new/experimental repo can't get automation wired
#     in and merged with zero review.
#   - workflow_dispatch (manual): same logic, plus a dry_run preview and an
#     optional single-repo target.
#
# Safety rails (both paths): opt-out via a repo's root .automation-core-ignore;
# skip repos that already have the sync workflow; owner-only, non-archived,
# non-fork repos, excluding automation-core itself. fail-soft: a missing
# CROSS_REPO_PAT exits GREEN with a notice (no red run), and a single failing
# repo is recorded and skipped rather than aborting the whole sweep.

on:
  schedule:
    # Weekly auto-enrollment sweep — Mondays 04:00 UTC. Offset from the other
    # crons (sync 03:00, ci-doctor 06/18, merge-bot 07:30, minutes-guard */30)
    # to avoid pile-ups. New repos aren't created hourly, so weekly is enough.
    # This run is NOT dry-run: it opens onboarding PRs but never merges them.
    - cron: '0 4 * * 1'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'List repos without creating PRs'
        required: false
        type: boolean
        default: false
      target_repo:
        description: 'Specific repo name to bootstrap (leave empty for all)'
        required: false
        type: string

permissions:
  contents: read  # for reading template

concurrency:
  # A manual run and the weekly sweep must not race each other.
  group: bootstrap-${{ github.repository }}
  cancel-in-progress: false

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout automation-core
        uses: actions/checkout@v5

      - name: Resolve CROSS_REPO_PAT (fail-soft)
        id: token
        uses: actions/github-script@v7
        env:
          CROSS_REPO_PAT: ${{ secrets.CROSS_REPO_PAT }}
        with:
          script: |
            // The workflow's own GITHUB_TOKEN is scoped to automation-core only.
            // Cross-repo onboarding needs a fine-grained PAT (CROSS_REPO_PAT)
            // with: Contents (write), Pull requests (write), Workflows (write),
            // Metadata (read); resource access = all repos owned by you.
            //
            // fail-soft: if the PAT is absent (e.g. on a scheduled run before
            // it's configured), exit GREEN with a notice instead of failing —
            // the same pattern the loop's other workflows use. The next step is
            // guarded by `if: steps.token.outputs.token != ''`, so it's skipped.
            if (!process.env.CROSS_REPO_PAT) {
              core.notice(
                'CROSS_REPO_PAT not configured — skipping bootstrap/auto-enroll (fail-soft). ' +
                'Add a fine-grained PAT (Contents + Pull requests + Workflows write, Metadata read; ' +
                'all repos) as the CROSS_REPO_PAT secret to enable onboarding.'
              );
              return;
            }
            core.setSecret(process.env.CROSS_REPO_PAT);
            core.setOutput('token', process.env.CROSS_REPO_PAT);

      - name: Bootstrap / auto-enroll eligible repos
        if: steps.token.outputs.token != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.token.outputs.token }}
          script: |
            const fs = require('fs');

            // On a `schedule` event there are no workflow inputs, so the input
            // expressions below render empty — guard with defaults so the script
            // stays valid JS and the scheduled sweep runs for-real (DRY_RUN
            // false) over all repos (TARGET_REPO empty).
            const DRY_RUN = ${{ inputs.dry_run || false }};
            const TARGET_REPO = '${{ inputs.target_repo || '' }}';
            const OWNER = context.repo.owner;
            const SOURCE_REPO = context.repo.repo;

            const templateContent = fs.readFileSync('template/sync-automation-core.yml', 'utf8');

            // Fetch all repos
            // Use authenticated user endpoint to include private repos.
            // listForUser only returns public repos regardless of token scope.
            const allRepos = await github.paginate(
              github.rest.repos.listForAuthenticatedUser,
              {
                per_page: 100,
                affiliation: 'owner',  // only repos owned by the user, not orgs/collaborated
              }
            );

            const eligibleRepos = allRepos.filter(r =>
              !r.archived &&
              !r.fork &&
              r.name !== SOURCE_REPO &&
              (TARGET_REPO === '' || r.name === TARGET_REPO)
            );

            core.info(`Found ${eligibleRepos.length} eligible repos (dry_run=${DRY_RUN})`);

            const results = [];

            for (const repo of eligibleRepos) {
              const repoName = repo.name;
              core.info(`\n--- ${repoName} ---`);

              // Per-repo guard: a single odd repo (empty, permissions, transient
              // API error) must not abort the whole unattended weekly sweep.
              try {
                // Check if sync workflow already exists
                try {
                  await github.rest.repos.getContent({
                    owner: OWNER,
                    repo: repoName,
                    path: '.github/workflows/sync-automation-core.yml',
                  });
                  results.push(`⏭ ${repoName}: already has sync workflow`);
                  continue;
                } catch (e) {
                  if (e.status !== 404) throw e;
                }

                // Check opt-out
                try {
                  await github.rest.repos.getContent({
                    owner: OWNER,
                    repo: repoName,
                    path: '.automation-core-ignore',
                  });
                  results.push(`⏭ ${repoName}: has opt-out file`);
                  continue;
                } catch (e) {
                  if (e.status !== 404) throw e;
                }

                if (DRY_RUN) {
                  results.push(`✨ ${repoName}: would create PR`);
                  continue;
                }

                // Get default branch SHA
                const { data: repoData } = await github.rest.repos.get({
                  owner: OWNER,
                  repo: repoName,
                });
                const defaultBranch = repoData.default_branch;

                const { data: ref } = await github.rest.git.getRef({
                  owner: OWNER,
                  repo: repoName,
                  ref: `heads/${defaultBranch}`,
                });
                const baseSha = ref.object.sha;

                // Create branch
                const branchName = 'chore/bootstrap-automation-core';
                try {
                  await github.rest.git.createRef({
                    owner: OWNER,
                    repo: repoName,
                    ref: `refs/heads/${branchName}`,
                    sha: baseSha,
                  });
                } catch (e) {
                  if (e.status === 422) {
                    results.push(`⏭ ${repoName}: branch ${branchName} already exists`);
                    continue;
                  }
                  throw e;
                }

                // Create file on branch
                await github.rest.repos.createOrUpdateFileContents({
                  owner: OWNER,
                  repo: repoName,
                  path: '.github/workflows/sync-automation-core.yml',
                  message: 'chore(automation): bootstrap sync from automation-core',
                  content: Buffer.from(templateContent).toString('base64'),
                  branch: branchName,
                });

                // Open PR (opened, never merged — the human/loop checkpoint)
                const { data: pr } = await github.rest.pulls.create({
                  owner: OWNER,
                  repo: repoName,
                  title: 'chore(automation): bootstrap sync from automation-core',
                  head: branchName,
                  base: defaultBranch,
                  body: `Adds daily sync workflow that pulls CI automation from [automation-core](https://github.com/${OWNER}/${SOURCE_REPO}).\n\nAfter merge, this repo will receive automatic PRs whenever automation-core updates the synced workflows.\n\nOpened automatically by auto-enrollment — review and merge to join the loop. To opt out, create \`.automation-core-ignore\` at the repo root (this PR will not be reopened).`,
                });

                results.push(`✅ ${repoName}: PR #${pr.number} — ${pr.html_url}`);
              } catch (e) {
                results.push(`⚠️ ${repoName}: error (skipped) — ${e.status || ''} ${e.message}`);
                continue;
              }
            }

            // Summary
            core.summary
              .addHeading('Bootstrap Results')
              .addList(results)
              .write();

            results.forEach(r => core.info(r));
