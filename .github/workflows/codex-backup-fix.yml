name: Codex Backup Fix

# Backup fixer for the self-healing loop. Dispatched by claude-fallback-watchdog
# when Claude doesn't deliver a fix within the timeout. Runs Codex IN GitHub
# Actions (openai/codex-action@v1) — NOT Codex Cloud, which strips secrets before
# its agent phase and therefore cannot push. This workflow generates a patch and
# pushes it directly to the EXISTING PR head branch (no new PR; merge-bot needs
# no change). Codex then auto-reviews the new head and the Codex Gate re-checks.
#
# DORMANT BY DEFAULT (fix #8): the watchdog only dispatches this workflow when the
# Actions variable CODEX_BACKUP_ENABLED is EXACTLY 'true'. It is off by default
# because the OpenAI quota is currently exhausted (codex-action fails with "Quota
# exceeded"); while off, the watchdog escalates to needs-owner instead. The file
# is intentionally LEFT IN PLACE so it can be re-enabled by (a) restoring OpenAI
# quota and (b) setting CODEX_BACKUP_ENABLED='true'.
#
# PREREQUISITES (PER-REPO — `sync` does NOT copy secrets or Actions settings):
#   - secret OPENAI_API_KEY on the repo (WITH available OpenAI quota/billing).
#   - Actions variable CODEX_BACKUP_ENABLED = 'true' (else the watchdog won't dispatch).
#   - Settings → Actions → General → Workflow permissions = Read and write.
# Without these the run fails-soft / cannot push / is never dispatched; that is
# expected on a repo that has not opted into Codex fallback.
#
# SECURITY (public repo): fork PRs are NEVER run through the agent (secrets must
# not be exposed to fork code) — Job 1 stops and escalates to needs-owner.
# Read handoffs/CONTEXT.md for the full loop.

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to fix'
        required: true
      head_sha:
        description: 'Head SHA the fix targets'
        required: true
      attempt:
        description: 'Cumulative attempt number (from the watchdog)'
        required: true

concurrency:
  group: codex-backup-fix-${{ github.repository }}-${{ inputs.pr_number }}
  cancel-in-progress: false

jobs:
  generate-patch:
    runs-on: ubuntu-latest
    # NO write token in this job — it runs the agent, which must never hold
    # push credentials. Fork escalation and terminal markers are emitted by
    # apply-and-push, the only write-capable job.
    permissions:
      contents: read
      pull-requests: read
    outputs:
      proceed: ${{ steps.guard.outputs.proceed }}
      fork_pr: ${{ steps.guard.outputs.fork_pr }}
      codex_agent_failed: ${{ steps.codex_agent_failure.outputs.failed }}
    steps:
      - name: Fork-PR security guard (no agent or secrets on forks)
        id: guard
        uses: actions/github-script@v8
        with:
          github-token: ${{ github.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = parseInt("${{ inputs.pr_number }}", 10);
            const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });
            const sameRepo =
              pr.head && pr.head.repo && pr.head.repo.full_name === `${owner}/${repo}`;
            if (!sameRepo) {
              // SECURITY: a fork PR's head is untrusted code. Never run the agent
              // or expose OPENAI_API_KEY on it. The write-capable job adds the
              // needs-owner escalation without checking out fork code.
              core.setOutput("proceed", "false");
              core.setOutput("fork_pr", "true");
              core.warning(`Fork PR #${prNumber}: refusing to run the Codex backup on fork code.`);
              return;
            }
            core.setOutput("proceed", "true");
            core.setOutput("fork_pr", "false");

      - name: Checkout PR head (read-only, no persisted creds)
        if: steps.guard.outputs.proceed == 'true'
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.head_sha }}
          persist-credentials: false

      - name: Gather the active Codex finding for this head
        if: steps.guard.outputs.proceed == 'true'
        uses: actions/github-script@v8
        with:
          github-token: ${{ github.token }}
          script: |
            // Write the active Codex P1/P2 finding text to a workspace file so
            // the agent can read what to fix. Best-effort; an empty/derived note
            // is acceptable. The file is UNTRACKED, so `git diff HEAD` (used to
            // capture the patch) never includes it.
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = parseInt("${{ inputs.pr_number }}", 10);
            const CODEX = 'chatgpt-codex-connector[bot]';
            const [rc, rv, prCommits, prData] = await Promise.all([
              github.paginate(github.rest.pulls.listReviewComments, {
                owner, repo, pull_number: prNumber, per_page: 100,
              }),
              github.paginate(github.rest.pulls.listReviews, {
                owner, repo, pull_number: prNumber, per_page: 100,
              }),
              github.paginate(github.rest.pulls.listCommits, {
                owner, repo, pull_number: prNumber, per_page: 100,
              }),
              github.rest.pulls.get({ owner, repo, pull_number: prNumber }),
            ]);
            // fix #24: FRESHNESS — mirror codex-gate.yml's date-only model. A finding
            // counts only if dated AFTER latestCommitDate (the MAX committer date
            // across the PR's commits, else pr.created_at); review COMMENTS by
            // created_at, review BODIES by submitted_at. Stale, already-addressed
            // P1/P2s must NOT be fed to the agent.
            const latestCommitDate = prCommits.length > 0
              ? new Date(Math.max(...prCommits.map((c) => new Date(c.commit.committer.date).getTime())))
              : new Date(prData.data.created_at);
            const isCodex = (c) => (c.user && c.user.login) === CODEX;
            const hasSev = (b) => b.includes("P1") || b.includes("P2");
            const texts = [
              ...rc.filter((c) => isCodex(c) && c.created_at && new Date(c.created_at) > latestCommitDate && hasSev(c.body || "")),
              ...rv.filter((c) => isCodex(c) && c.submitted_at && new Date(c.submitted_at) > latestCommitDate && hasSev(c.body || "")),
            ].map((c) => c.body || "");
            const fs = require('fs');
            const out = texts.join("\n\n---\n\n").slice(0, 8000) ||
              "No specific Codex finding text was captured; review the PR diff and fix any P1/P2 issues Codex would raise.";
            fs.writeFileSync('codex-finding.txt', out);
            core.info(`Wrote codex-finding.txt with ${texts.length} fresh finding section(s) (after ${latestCommitDate.toISOString()}).`);

      - name: Run Codex to fix the finding (CI agent, not Cloud)
        id: codex_agent
        if: steps.guard.outputs.proceed == 'true'
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          # workspace-write lets the agent edit the working tree; drop-sudo is the
          # default safety strategy (no privilege escalation).
          sandbox: workspace-write
          safety-strategy: drop-sudo
          allow-users: '*'
          prompt: |
            You are the BACKUP fixer for pull request #${{ inputs.pr_number }} in this
            repository. The primary fixer did not deliver in time. The active Codex
            review finding(s) for the current head are in the file `codex-finding.txt`
            at the repository root. Read that file, then fix the finding(s) in the
            working tree with the MINIMAL change that resolves them. Do not refactor
            unrelated code. Do NOT add or reference any escalation label. If you edit a
            workflow under `.github/workflows/` or `workflows/`, keep both copies
            byte-identical. Do not commit or push — just leave the fix in the working
            tree.

      - name: Record Codex agent failure
        id: codex_agent_failure
        if: failure() && steps.codex_agent.outcome == 'failure'
        run: echo "failed=true" >> "$GITHUB_OUTPUT"

      - name: Capture the patch (no push in this job)
        if: steps.guard.outputs.proceed == 'true' && steps.codex_agent.outcome == 'success'
        run: |
          # Remove the untracked finding file just in case, then capture only
          # tracked changes the agent made. The file always exists (possibly
          # empty) so the artifact upload + download below are reliable.
          rm -f codex-finding.txt
          git diff --binary HEAD > codex.patch || true
          if [ -s codex.patch ]; then
            echo "Patch captured ($(wc -l < codex.patch) lines)."
          else
            echo "::notice::Codex produced no changes — empty patch."
          fi

      - name: Upload patch artifact
        if: steps.guard.outputs.proceed == 'true' && steps.codex_agent.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: codex-patch
          path: codex.patch
          if-no-files-found: ignore
          retention-days: 1

  apply-and-push:
    needs: generate-patch
    if: always() && (needs.generate-patch.outputs.proceed == 'true' || needs.generate-patch.outputs.fork_pr == 'true' || needs.generate-patch.outputs.codex_agent_failed == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Escalate fork-headed PR skip
        if: needs.generate-patch.outputs.fork_pr == 'true'
        uses: actions/github-script@v8
        env:
          AUTOMATION_PAT: ${{ secrets.AUTOMATION_PAT }}
        with:
          github-token: ${{ secrets.AUTOMATION_PAT }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = parseInt("${{ inputs.pr_number }}", 10);
            const headSha = "${{ inputs.head_sha }}";
            const attempt = "${{ inputs.attempt }}";
            try {
              await github.rest.issues.createLabel({
                owner, repo, name: 'needs-owner', color: 'd93f0b',
                description: 'Escalation — automation stopped, human needed',
              });
            } catch (e) { if (e.status !== 422) core.info(`createLabel needs-owner failed (ignored): ${e.message}`); }
            try {
              await github.rest.issues.addLabels({ owner, repo, issue_number: prNumber, labels: ['needs-owner'] });
            } catch (e) { core.info(`addLabel needs-owner failed (ignored): ${e.message}`); }
            try {
              await github.rest.issues.createComment({
                owner, repo, issue_number: prNumber,
                body: `<!-- ai-loop:v1 root_pr=${prNumber} head=${headSha} attempt=${attempt} agent=codex state=fixer_error -->\nCodex API backup skipped this fork-headed PR for security: fork code never receives agent secrets. Escalated to needs-owner.`,
              });
            } catch (e) { core.info(`fork skip marker failed (ignored): ${e.message}`); }
            core.warning(`PR #${prNumber}: fork-headed PR skipped before Codex agent; escalated to needs-owner.`);

      - name: Post Codex agent failure marker
        if: needs.generate-patch.outputs.codex_agent_failed == 'true'
        uses: actions/github-script@v8
        env:
          AUTOMATION_PAT: ${{ secrets.AUTOMATION_PAT }}
        with:
          github-token: ${{ secrets.AUTOMATION_PAT }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = parseInt("${{ inputs.pr_number }}", 10);
            const headSha = "${{ inputs.head_sha }}";
            const attempt = "${{ inputs.attempt }}";
            core.error("Codex API agent failed before producing a patch — see the generate-patch job log.");
            try {
              await github.rest.issues.createComment({
                owner, repo, issue_number: prNumber,
                body: `<!-- ai-loop:v1 root_pr=${prNumber} head=${headSha} attempt=${attempt} agent=codex state=api_error -->\nCodex API agent failed before producing a patch (see run log) — not counted as delivery.`,
              });
            } catch (e) { core.info(`api_error marker comment failed (ignored): ${e.message}`); }

      - name: Resolve PR head ref + stale-head guard
        id: resolve
        if: needs.generate-patch.outputs.proceed == 'true'
        uses: actions/github-script@v8
        env:
          AUTOMATION_PAT: ${{ secrets.AUTOMATION_PAT }}
        with:
          github-token: ${{ secrets.AUTOMATION_PAT }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = parseInt("${{ inputs.pr_number }}", 10);
            const inputSha = "${{ inputs.head_sha }}";
            const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });
            // STALE-HEAD GUARD: if the head advanced while Codex worked, the patch
            // is against an old tree — do NOT apply it. A fresh review on the new
            // head starts a new cycle.
            const stale = pr.head.sha !== inputSha;
            core.setOutput("head_ref", pr.head.ref);
            core.setOutput("stale", stale ? "true" : "false");

      - name: Checkout PR head branch (write creds via AUTOMATION_PAT)
        if: needs.generate-patch.outputs.proceed == 'true' && steps.resolve.outputs.stale == 'false'
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.resolve.outputs.head_ref }}
          token: ${{ secrets.AUTOMATION_PAT }}
          fetch-depth: 0

      - name: Download patch artifact
        if: needs.generate-patch.outputs.proceed == 'true' && steps.resolve.outputs.stale == 'false'
        uses: actions/download-artifact@v4
        with:
          name: codex-patch
          path: .

      - name: Apply patch and push to the PR head branch
        id: apply
        if: needs.generate-patch.outputs.proceed == 'true' && steps.resolve.outputs.stale == 'false'
        env:
          HEAD_REF: ${{ steps.resolve.outputs.head_ref }}
          PR_NUMBER: ${{ inputs.pr_number }}
        run: |
          # fix #24: report honest end states via the `pushed` output — 'false' on
          # the empty-patch no-op, 'true' ONLY after git push actually succeeds.
          if [ ! -s codex.patch ]; then
            echo "::notice::No patch to apply (empty) — nothing to push."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name 'codex-backup'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git apply --index codex.patch
          git commit -m "fix(codex): resolve review finding on PR #${PR_NUMBER}"
          git push origin "HEAD:${HEAD_REF}"
          echo "pushed=true" >> "$GITHUB_OUTPUT"

      - name: Post pushed marker (counts-only)
        # fix #24: ONLY when a push actually happened (pushed=='true').
        if: needs.generate-patch.outputs.proceed == 'true' && steps.resolve.outputs.stale == 'false' && steps.apply.outputs.pushed == 'true'
        uses: actions/github-script@v8
        env:
          AUTOMATION_PAT: ${{ secrets.AUTOMATION_PAT }}
        with:
          github-token: ${{ secrets.AUTOMATION_PAT }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = parseInt("${{ inputs.pr_number }}", 10);
            const attempt = "${{ inputs.attempt }}";
            const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });
            const newSha = pr.head.sha;
            await github.rest.issues.createComment({
              owner, repo, issue_number: prNumber,
              body: `<!-- ai-loop:v1 root_pr=${prNumber} head=${newSha} attempt=${attempt} agent=codex state=pushed -->\nCodex backup pushed a fix to the PR head branch (attempt ${attempt}). Codex will re-review the new head.`,
            });

      - name: Post no-change marker (empty patch — NOT a fix)
        # fix #24: the apply step SUCCEEDED but produced no push (empty patch). Never
        # claim state=pushed. The fix #23 watchdog judges by deliveredSince (real
        # commits) anyway; this marker is honest and informational.
        if: needs.generate-patch.outputs.proceed == 'true' && steps.resolve.outputs.stale == 'false' && steps.apply.outputs.pushed == 'false'
        uses: actions/github-script@v8
        env:
          AUTOMATION_PAT: ${{ secrets.AUTOMATION_PAT }}
        with:
          github-token: ${{ secrets.AUTOMATION_PAT }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = parseInt("${{ inputs.pr_number }}", 10);
            const attempt = "${{ inputs.attempt }}";
            const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });
            const newSha = pr.head.sha;
            core.notice(`Codex backup produced no changes (empty patch) on PR #${prNumber} — not counted as a fix.`);
            await github.rest.issues.createComment({
              owner, repo, issue_number: prNumber,
              body: `<!-- ai-loop:v1 root_pr=${prNumber} head=${newSha} attempt=${attempt} agent=codex state=no_change -->\nCodex backup produced no changes (empty patch) — not counted as a fix.`,
            });

      - name: Post patch-failed marker (apply/commit/push error)
        # fix #24: the apply step FAILED (git apply/commit/push error) — LOUD, never
        # silent, and never state=pushed.
        if: needs.generate-patch.outputs.proceed == 'true' && failure() && steps.resolve.outputs.stale == 'false'
        uses: actions/github-script@v8
        env:
          AUTOMATION_PAT: ${{ secrets.AUTOMATION_PAT }}
        with:
          github-token: ${{ secrets.AUTOMATION_PAT }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = parseInt("${{ inputs.pr_number }}", 10);
            const attempt = "${{ inputs.attempt }}";
            core.error("Codex backup patch failed to apply/push — see run log.");
            try {
              const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });
              const newSha = pr.head.sha;
              await github.rest.issues.createComment({
                owner, repo, issue_number: prNumber,
                body: `<!-- ai-loop:v1 root_pr=${prNumber} head=${newSha} attempt=${attempt} agent=codex state=patch_failed -->\nCodex backup patch failed to apply/push (see run log) — not counted as a fix.`,
              });
            } catch (e) { core.info(`patch_failed marker comment failed (ignored): ${e.message}`); }

      - name: Note stale-head skip (no push)
        if: needs.generate-patch.outputs.proceed == 'true' && steps.resolve.outputs.stale == 'true'
        uses: actions/github-script@v8
        env:
          AUTOMATION_PAT: ${{ secrets.AUTOMATION_PAT }}
        with:
          github-token: ${{ secrets.AUTOMATION_PAT }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = parseInt("${{ inputs.pr_number }}", 10);
            const inputSha = "${{ inputs.head_sha }}";
            const attempt = "${{ inputs.attempt }}";
            core.warning(
              `PR #${prNumber}: head advanced while Codex worked — skipping the stale patch (a fresh review on the new head starts a new cycle).`,
            );
            try {
              await github.rest.issues.createComment({
                owner, repo, issue_number: prNumber,
                body: `<!-- ai-loop:v1 root_pr=${prNumber} head=${inputSha} attempt=${attempt} agent=codex state=stale -->\nCodex backup patch went stale: the PR head advanced while Codex worked, so the patch was not applied. A fresh review on the new head will start a new cycle.`,
              });
            } catch (e) { core.info(`note failed (ignored): ${e.message}`); }
