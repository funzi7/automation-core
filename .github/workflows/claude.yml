name: Claude Fixer

# Generic workflow — synced from automation-core to every participating
# repo. Part of the Self-Healing Loop:
#   ci-doctor (opens claude-fix Issue) → THIS (fixes, opens PR) →
#   codex-gate (reviews) → merge-bot (merges when green).
#
# fail-soft: the first step checks whether ANTHROPIC_API_KEY is set. If
# it is empty (repo intentionally has no key, to restrain cost), the job
# exits GREEN with a log notice instead of failing red. So syncing this
# file to a key-less repo never produces failures and burns ~0 minutes.
#
# Loop-trigger trap: a PR opened with the default GITHUB_TOKEN does NOT
# trigger other workflows (GitHub loop protection), so codex-gate would
# never run on Claude's PR. We therefore hand the action AUTOMATION_PAT
# as github_token (falling back to the default token when the PAT is
# absent, so the action still works in fail-soft repos).

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, labeled, assigned]

# One fix at a time per Issue/PR. cancel-in-progress: FALSE — a Claude run
# costs money by the minute, so we must NEVER cancel one that is already
# burning time. A second event for the same Issue/PR queues BEHIND the
# running one (serialized, not parallel, not cancelled). The real defense
# against duplicate runs is upstream: each event maps to exactly one clause
# in the job `if:` below (no single action fires two runs), and
# codex-auto-fix no longer wakes on Issue events at all.
concurrency:
  group: claude-fix-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: read        # Claude reads CI run logs on PRs/Issues
  id-token: write      # OIDC for the action (harmless if unused)

jobs:
  claude:
    # Trigger on: @claude mention in a comment, an assigned Issue, or an
    # Issue labeled `claude-fix` (the label_trigger path ci-doctor uses).
    # fix #26 kill-switch: flip the repo Actions var CLAUDE_ENABLED=false while the
    # Anthropic credit is exhausted to skip even the ~17s billing bounce (absent
    # var = enabled). Wraps the existing trigger condition, never replaces it.
    if: |
      vars.CLAUDE_ENABLED != 'false' && (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'issues' && github.event.action == 'assigned') ||
        (github.event_name == 'issues' && github.event.action == 'labeled' && github.event.label.name == 'claude-fix') ||
        (github.event_name == 'issues' && github.event.action == 'opened' && contains(join(github.event.issue.labels.*.name, ','), 'claude-fix'))
      )
    runs-on: ubuntu-latest
    steps:
      - name: Fail-soft check for ANTHROPIC_API_KEY
        id: keycheck
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "${ANTHROPIC_API_KEY}" ]; then
            echo "::notice::ANTHROPIC_API_KEY is not set in this repo — skipping Claude Fixer (fail-soft, no error)."
            echo "has_key=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_key=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        if: steps.keycheck.outputs.has_key == 'true'
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Run Claude Code
        id: claude
        if: steps.keycheck.outputs.has_key == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # PAT so Claude's PR triggers codex-gate; default token fallback.
          github_token: ${{ secrets.AUTOMATION_PAT || github.token }}
          trigger_phrase: "@claude"
          label_trigger: "claude-fix"
          # fix #16: expose the SDK transcript ONLY when the repo opts in via the
          # Actions variable CLAUDE_SHOW_FULL_OUTPUT == 'true'. Default (var unset
          # or any other value) keeps today's hidden output ("full output hidden
          # for security") — the safe default for PUBLIC downstreams, where the
          # transcript can echo file contents into world-readable logs. On a
          # PRIVATE repo, flip the repo Actions var to 'true' temporarily to
          # enumerate permission denials BY TOOL NAME (an error_max_turns run
          # reports permission_denials_count but hides WHICH tools were denied, so
          # the count alone can't tune --allowedTools), then flip it back.
          show_full_output: ${{ vars.CLAUDE_SHOW_FULL_OUTPUT == 'true' }}
          # --max-turns 50 + a BROAD allowlist (fix #7). The previous
          # --max-turns 20 + narrow per-subcommand list caused error_max_turns
          # on paywall-bot #49: the fixer kept trying tools OUTSIDE the allowlist
          # (11 permission_denials), burning all 20 turns on denial churn without
          # opening a fix PR. Now: 50 turns; broad `Bash(git:*)`; the common
          # interpreters/inspectors a fix needs (python/python3/pytest/pip/node/
          # npm + ls/cat/find/head/tail/sed/mkdir/cp/mv); plus MultiEdit. gh
          # stays limited to pr/issue. SECURITY: the fixer can already commit +
          # push code via Edit + git, so a broader COMMAND allowlist adds little
          # marginal risk; tighten if desired. The PR's CI (codex-gate) remains
          # the real validation gate.
          claude_args: |
            --max-turns 50
            --allowedTools "Read,Glob,Grep,Edit,Write,MultiEdit,Bash(git:*),Bash(python:*),Bash(python3:*),Bash(pytest:*),Bash(pip:*),Bash(node:*),Bash(npm:*),Bash(ls:*),Bash(cat:*),Bash(find:*),Bash(head:*),Bash(tail:*),Bash(sed:*),Bash(mkdir:*),Bash(cp:*),Bash(mv:*),Bash(gh pr:*),Bash(gh issue:*),Bash(actionlint)"
          additional_permissions: |
            actions: read
          prompt: |
            You are the autonomous fixer in a self-healing CI loop. You were
            invoked on a GitHub Issue or PR in this repository.

            If triggered by a `claude-fix` Issue (opened by ci-doctor):
              1. Read the Issue body: it has the failed workflow name, the
                 failed job names, a link to the failing run, and a tail of the
                 failing job logs. Diagnose the ROOT CAUSE from those logs — do
                 not guess.
              2. Create a NEW branch (e.g. `claude/fix-<short-desc>`). NEVER
                 commit or push directly to `main`.
              3. Apply the minimal fix. If the repo has a CLAUDE.md with a
                 build/test/gate command, OBEY it and run that gate locally;
                 it must be green before you open the PR.
              4. Open a PR from your branch that links the Issue with
                 `Fixes #<N>` (the Issue number you were invoked on) and briefly
                 explains the root cause and the fix.
              5. Do NOT merge the PR yourself — codex-gate reviews it and
                 merge-bot merges once everything is green.

            Prefer the allowed tools and do NOT attempt tools outside the allowlist (denied calls waste your turn budget); the PR's CI (codex-gate) is the final validation, so do not block on running the full suite locally if the sandbox can't.

            If triggered by an @claude mention, follow the request in the
            comment, working on a branch and opening a PR the same way.

      - name: Delivery check — did a fix land on the head?
        id: delivery
        # fix #23: judge Claude by DELIVERY, not by the action's conclusion.
        # claude-code-action returns `success` on a 15s no-op with zero commits
        # (TRF #84), so the conclusion is meaningless. DELIVERED = at least one new
        # commit on the PR head ref since the trigger comment's timestamp. Runs
        # whenever the key is present (independent of the Claude step's outcome).
        if: always() && steps.keycheck.outputs.has_key == 'true'
        uses: actions/github-script@v7
        env:
          # fix #26: the action's SDK writes a terminal result JSON here. Prefer the
          # step output if the action declares one; else the delivery step finds it
          # under RUNNER_TEMP. Used to CLASSIFY a non-delivery (billing/error/no-op).
          EXECUTION_FILE: ${{ steps.claude.outputs.execution_file }}
        with:
          github-token: ${{ secrets.AUTOMATION_PAT || github.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const comment = context.payload.comment;
            if (!comment) {
              core.info('No trigger comment (Issue/label event) — delivery check N/A, treat as delivered.');
              core.setOutput('delivered', 'true');
              return;
            }
            const since = comment.created_at;
            let pr = context.payload.pull_request;
            if (!pr && context.payload.issue && context.payload.issue.pull_request) {
              try { pr = (await github.rest.pulls.get({ owner, repo, pull_number: context.payload.issue.number })).data; }
              catch (e) { core.info(`pulls.get failed: ${e.message}`); }
            }
            if (!pr || !pr.head || !pr.head.ref) {
              core.info('No PR head resolvable — delivery check N/A, treat as delivered.');
              core.setOutput('delivered', 'true');
              return;
            }
            const sinceMs = new Date(since).getTime();
            let delivered = false;
            try {
              const commits = await github.paginate(github.rest.repos.listCommits, {
                owner, repo, sha: pr.head.ref, since, per_page: 100,
              });
              delivered = commits.some((c) => new Date(c.commit.committer.date).getTime() > sinceMs);
              core.info(`Delivery check: ${commits.length} commit(s) on ${pr.head.ref} since ${since} → delivered=${delivered}`);
            } catch (e) {
              // fail-soft: if we can't tell, do NOT falsely mark undelivered (a wrong
              // 👎). The watchdog's own delivery window still catches a real no-op.
              core.info(`listCommits failed (treat as delivered, fail-soft): ${e.message}`);
              delivered = true;
            }
            core.setOutput('delivered', delivered ? 'true' : 'false');

            // fix #26: CLASSIFY a non-delivery from the SDK terminal result. TRF #88
            // proved the action reports subtype:"success" even when the account is
            // out of credit (is_error:true, "Credit balance is too low", 0 tokens),
            // so a dead fixer looked like a mysterious no-op. Only the honest class
            // lets the watchdog skip the 20-min wait / stop proxying an empty account.
            let cls = 'no_delivery';   // default when no result file (behavior unchanged)
            let resultStr = '';
            if (!delivered) {
              const fs = require('fs');
              const cp = require('child_process');
              let file = process.env.EXECUTION_FILE;
              if (!file || !fs.existsSync(file)) {
                try {
                  const found = cp.execSync(`find "${process.env.RUNNER_TEMP}" -maxdepth 2 -name 'claude-execution-output.json' 2>/dev/null`).toString().trim().split('\n')[0];
                  if (found && fs.existsSync(found)) file = found;
                } catch (e) { /* find failed — classification skipped */ }
              }
              if (file && fs.existsSync(file)) {
                try {
                  const txt = fs.readFileSync(file, 'utf8');
                  let result = null;
                  try {
                    const j = JSON.parse(txt);
                    const arr = Array.isArray(j) ? j : [j];
                    result = arr.find((x) => x && x.type === 'result') || null;
                  } catch (e) {
                    for (const line of txt.split('\n')) { try { const o = JSON.parse(line); if (o && o.type === 'result') result = o; } catch (e2) {} }
                  }
                  const isErr = !!(result && result.is_error);
                  resultStr = String((result && result.result) || '').slice(0, 200);
                  const billing = /billing_error/.test(txt) || /Credit balance is too low/i.test(resultStr) || /Credit balance is too low/i.test(txt);
                  if (isErr && billing) cls = 'billing_error';
                  else if (isErr) cls = 'fixer_error';
                  else cls = 'no_delivery';   // ran, no error, no commit → genuine no-op
                  core.info(`SDK outcome class: ${cls} (is_error=${isErr}) result="${resultStr}" from ${file}`);
                } catch (e) { core.info(`classify failed (default no_delivery): ${e.message}`); }
              } else {
                core.info('No claude-execution-output.json found — classification skipped (default no_delivery).');
              }
            }
            core.setOutput('class', cls);
            core.setOutput('resultStr', resultStr);

      - name: Mark a no-delivery fix (👎 + ladder handoff)
        # fix #23: fire when the Claude step DID NOT SUCCEED **OR** succeeded but
        # DELIVERED NOTHING (no new commit on the head — the TRF #84 no-op-success
        # trap that the old `outcome != 'success'` guard missed). Gated on has_key
        # so a fail-soft no-key skip isn't 👎'd. Fully fail-soft: an error here must
        # NEVER fail the job.
        if: ${{ always() && steps.keycheck.outputs.has_key == 'true' && (steps.claude.outcome != 'success' || steps.delivery.outputs.delivered != 'true') }}
        uses: actions/github-script@v7
        env:
          # fix #26: the classified outcome from the delivery step.
          CLAUDE_CLASS: ${{ steps.delivery.outputs.class }}
          CLAUDE_RESULT: ${{ steps.delivery.outputs.resultStr }}
        with:
          github-token: ${{ secrets.AUTOMATION_PAT || github.token }}
          script: |
            try {
              const owner = context.repo.owner;
              const repo = context.repo.repo;
              const comment = context.payload.comment;
              const commentId = comment && comment.id;
              // fix #26: honest failure class (billing_error / fixer_error / no_delivery).
              const cls = (process.env.CLAUDE_CLASS || 'no_delivery').trim() || 'no_delivery';
              const resultStr = (process.env.CLAUDE_RESULT || '').slice(0, 200);
              if (cls === 'billing_error' || cls === 'fixer_error') {
                core.error(`Claude fixer ${cls} — no fix delivered. result="${resultStr || '(none)'}"`);
              }
              // ADD-ONLY 👎 (fix #23): the 👀 on the trigger is placed by the hosted
              // `claude[bot]` App — a DIFFERENT identity whose reactions we cannot
              // delete (cross-identity deletion is forbidden), and our own 👀 may not
              // exist. So we NEVER "swap"; we ADD a 👎 to signal the no-delivery.
              if (commentId) {
                const isReviewComment = context.eventName === 'pull_request_review_comment';
                const createReaction = isReviewComment
                  ? github.rest.reactions.createForPullRequestReviewComment
                  : github.rest.reactions.createForIssueComment;
                try {
                  await createReaction({ owner, repo, comment_id: commentId, content: '-1' });
                  core.info(`Added 👎 on comment ${commentId} (Claude delivered no fix).`);
                } catch (e) { core.info(`add 👎 failed (ignored): ${e.message}`); }
              } else {
                core.info('No triggering comment id (Issue event) — no reaction to add.');
              }
              // UPSERT an ai-loop marker so the watchdog can advance the fixer ladder
              // WITHOUT waiting the full 20-min timeout. state=no_delivery on the head.
              let pr = context.payload.pull_request;
              if (!pr && context.payload.issue && context.payload.issue.pull_request) {
                try { pr = (await github.rest.pulls.get({ owner, repo, pull_number: context.payload.issue.number })).data; } catch (e) { core.info(`pulls.get failed: ${e.message}`); }
              }
              if (pr && pr.head) {
                const headSha = pr.head.sha;
                const prNumber = pr.number;
                let attempt = 1;
                const mm = (comment && comment.body || '').match(/ai-loop:v1[^>]*\battempt=(\d+)/);
                if (mm) attempt = parseInt(mm[1], 10);
                let exists = false;
                try {
                  const ic = await github.paginate(github.rest.issues.listComments, { owner, repo, issue_number: prNumber, per_page: 100 });
                  exists = ic.some((c) => { const b = c.body || ''; return b.includes('agent=claude ') && b.includes(`state=${cls}`) && b.includes(`head=${headSha}`); });
                } catch (e) { core.info(`listComments failed (ignored): ${e.message}`); }
                if (!exists) {
                  const note = cls === 'billing_error'
                    ? 'Claude fixer hit a billing_error (Anthropic credit exhausted) — no inference ran (0 tokens). Handing off to the fixer ladder (watchdog).'
                    : cls === 'fixer_error'
                    ? `Claude fixer errored — no commit delivered ("${resultStr}"). Handing off to the fixer ladder (watchdog).`
                    : 'Claude Code ran but delivered no commit on this head — handing off to the fixer ladder (watchdog).';
                  try {
                    await github.rest.issues.createComment({ owner, repo, issue_number: prNumber, body: `<!-- ai-loop:v1 root_pr=${prNumber} head=${headSha} attempt=${attempt} agent=claude state=${cls} -->\n${note}` });
                    core.info(`Posted claude/${cls} marker for PR #${prNumber} head ${headSha}.`);
                  } catch (e) { core.info(`${cls} marker failed (ignored): ${e.message}`); }
                }
              }
            } catch (e) {
              core.info(`no-delivery handling failed (ignored): ${e.message}`);
            }

      - name: Label Claude's PR for auto-merge
        # P1 fix: only label when Claude Code actually RAN AND SUCCEEDED. With
        # always() this labeled PRs even on a failed/cancelled run, so a PR
        # Claude did NOT fix could pick up `automerge` and auto-merge.
        # steps.claude.outcome is 'success' only on a real success; it is
        # 'failure'/'cancelled' on a bad run and 'skipped' in the
        # fail-soft (no ANTHROPIC_API_KEY) path — none of which should label.
        if: steps.claude.outcome == 'success'
        uses: actions/github-script@v7
        with:
          # AUTOMATION_PAT (default-token fallback) so merge-bot can pick up the
          # PR. Claude's PRs are authored by the owner (PAT-authed), not a bot,
          # so without the `automerge` label merge-bot can't identify them.
          github-token: ${{ secrets.AUTOMATION_PAT || github.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            // Upsert the label (addLabels only attaches existing labels).
            try {
              await github.rest.issues.createLabel({ owner, repo, name: 'automerge', color: '0e8a16', description: 'Auto-merge by Merge Bot once green' });
            } catch (e) { if (e.status !== 422) core.info(`createLabel automerge failed (ignored): ${e.message}`); }

            async function label(prNumber) {
              try {
                await github.rest.issues.addLabels({ owner, repo, issue_number: prNumber, labels: ['automerge'] });
                core.info(`Labeled PR #${prNumber} automerge.`);
              } catch (e) { core.info(`addLabel automerge on #${prNumber} failed (ignored): ${e.message}`); }
            }

            // ONLY label a PR that Claude CREATED to resolve a claude-fix Issue:
            // Claude opened a NEW PR closing the triggering Issue (Fixes #N); find
            // the open PR(s) linking this issue and label those. We deliberately do
            // NOT label an arbitrary PR reached via an @claude mention — that would
            // auto-merge any PR that merely mentions Claude (Codex P1).
            const issueNum = context.payload.issue && context.payload.issue.number;
            if (!issueNum) { core.info('No issue/PR context to label.'); return; }
            const open = await github.paginate(github.rest.pulls.list, { owner, repo, state: 'open', per_page: 100 });
            const re = new RegExp(`(?:close|closes|closed|fix|fixes|fixed|resolve|resolves|resolved)\\s+#${issueNum}\\b`, 'i');
            const matches = open.filter((pr) => re.test(pr.body || ''));
            if (!matches.length) { core.info(`No open PR found that closes #${issueNum}.`); return; }
            for (const pr of matches) await label(pr.number);
