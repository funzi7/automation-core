name: Codex Auto-Fix

# Auto-respond to Codex bot reviews with `@claude fix` so Claude
# (the trusted fixer, via claude.yml) drives the follow-up commit
# when Codex flags a P1 issue (a real bug or security hole).
# Direction is deliberate: Codex reviews, Claude fixes — we never
# hand the fix back to Codex. Without this workflow a human would
# have to type the trigger.
#
# P1 ONLY: P2 findings (style / nice-to-have) never auto-trigger a
# paid Claude run — Codex always finds another P2, which created a
# near-infinite review/fix loop. P2 notes stay on the PR for
# reference; the owner can post `@claude fix` by hand for a specific one.
#
# The comment is posted with AUTOMATION_PAT (not GITHUB_TOKEN): a
# comment made with the default token does NOT start other workflows
# (GitHub loop protection), so claude.yml would never see the mention.
#
# Safety rails:
#   - Only fires on comments from chatgpt-codex-connector[bot].
#     An external attacker can't impersonate the bot login, so
#     this is the right authentication surface.
#   - Circuit breaker: capped at 3 @claude fix rounds per PR. After
#     3 rounds that haven't converged, stop auto-triggering, add the
#     needs-owner label (merge-bot then ignores the PR), and ping
#     Telegram if configured. Prevents the near-infinite review/fix
#     loop (each round costs real money).
#   - Substring match on "P1" in the review body. Codex uses badge
#     URLs like `P1-orange?style=flat` so the literal substring is
#     reliable; "no issues" reviews don't include that token. (Same
#     existing detection — P2 is intentionally NOT matched, so P2-
#     only reviews never start a run.)
#   - Cross-channel debounce: a Codex review with N inline comments
#     fires N events across TWO channels (issue comments AND review
#     comments). We dedupe the "[auto-triggered]" marker across BOTH
#     channels (+ reviews), so a whole review wave yields exactly
#     ONE @claude fix no matter how many inline notes it carries.

on:
  pull_request_review:
    types: [submitted]
  # Inline review comments (single line of code, not wrapped in a
  # full PR review). Codex usually batches inline notes into a review
  # event, but occasionally drops one as a standalone comment —
  # without this, those bypass the auto-fix loop.
  pull_request_review_comment:
    types: [created]
  issue_comment:
    types: [created]

permissions:
  # Need write to comment on the PR. issues:write is required
  # because the GH issues API also services PR-level comments
  # (PRs are issues with extra fields). pull-requests:write is
  # for the review-event payload access.
  issues: write
  pull-requests: write

jobs:
  trigger_codex_fix:
    runs-on: ubuntu-latest
    # Debounce: serialize bridge runs per PR so the cross-channel dedupe in
    # the Check step reliably sees a prior @claude fix comment BEFORE the next
    # event is processed. A Codex review with N inline comments fires N events
    # (in two channels); this serialization + the dedupe = ONE @claude fix per
    # review wave (Claude reads the whole PR and fixes every P1 in one run).
    concurrency:
      group: codex-claude-bridge-${{ github.repository }}-${{ github.event.pull_request.number || github.event.issue.number }}
      cancel-in-progress: false
    # Per-event explicit gate: each clause requires (1) the right
    # event_name, (2) the bot author on the right payload field, and
    # (3) a P1 marker in the body. Pulling P1 into the if: short-
    # circuits the runner for both "Codex says LGTM" AND P2-only
    # reviews entirely — P2 must never start a paid fix run — instead
    # of starting the runner and bailing in JS. (The check step still
    # confirms an ACTIVE P1 across the whole review wave.)
    #
    # Three branches mirror the on: events that can carry actionable
    # bot feedback: PR review, inline review-comment, top-level
    # issue/PR comment. This workflow does NOT listen to `issues`
    # events — it only responds to Codex reviews/comments on PRs.
    if: |
      (github.event_name == 'pull_request_review' &&
       github.event.review.user.login == 'chatgpt-codex-connector[bot]' &&
       contains(github.event.review.body, 'P1')) ||
      (github.event_name == 'pull_request_review_comment' &&
       github.event.comment.user.login == 'chatgpt-codex-connector[bot]' &&
       contains(github.event.comment.body, 'P1')) ||
      (github.event_name == 'issue_comment' &&
       github.event.comment.user.login == 'chatgpt-codex-connector[bot]' &&
       contains(github.event.comment.body, 'P1'))

    steps:
      - name: Check if review has actionable feedback
        id: check_review
        uses: actions/github-script@v7
        env:
          AUTOMATION_PAT: ${{ secrets.AUTOMATION_PAT }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        with:
          script: |
            // fail-soft: the @claude auto-trigger comment must be posted
            // with AUTOMATION_PAT (a GITHUB_TOKEN comment won't trigger
            // claude.yml). If the PAT isn't set in this repo, skip quietly
            // rather than post a comment that would go nowhere.
            if (!process.env.AUTOMATION_PAT) {
              core.info("AUTOMATION_PAT not set — skipping @claude auto-trigger (fail-soft).");
              core.setOutput("should_trigger", "false");
              return;
            }
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // PR number: pull_request_review / pull_request_review_comment
            // payloads carry `pull_request`; issue_comment carries `issue`
            // (PRs are issues for the comments API).
            const prNumber =
              context.payload.pull_request?.number ||
              context.payload.issue?.number;
            if (!prNumber) {
              core.info("No PR number in payload; skipping");
              core.setOutput("should_trigger", "false");
              return;
            }

            const MARKER = "[auto-triggered]";
            const CODEX = "chatgpt-codex-connector[bot]";

            // Pull EVERY feedback channel, fully paginated. Codex inline notes
            // (pull_request_review_comment) live in a DIFFERENT channel from
            // top-level PR comments (issue_comment), and the bridge posts its
            // own inline @claude fix as a review-comment REPLY. The old code
            // counted only issues.listComments, so it never saw those inline
            // auto-triggers — that's why a single Codex review with several
            // inline notes fired several runs (PR #19: 3 notes → 2 triggers).
            const [issueComments, reviewComments, reviews] = await Promise.all([
              github.paginate(github.rest.issues.listComments, {
                owner, repo, issue_number: prNumber, per_page: 100,
              }),
              github.paginate(github.rest.pulls.listReviewComments, {
                owner, repo, pull_number: prNumber, per_page: 100,
              }),
              github.paginate(github.rest.pulls.listReviews, {
                owner, repo, pull_number: prNumber, per_page: 100,
              }),
            ]);

            // Normalise all three channels to { body, login, date } so the
            // marker dedupe AND the P1 scan span every channel at once.
            // Reviews use submitted_at; comments use created_at.
            const norm = [
              ...issueComments.map((c) => ({ body: c.body, login: c.user?.login, date: c.created_at })),
              ...reviewComments.map((c) => ({ body: c.body, login: c.user?.login, date: c.created_at })),
              ...reviews.map((r) => ({ body: r.body, login: r.user?.login, date: r.submitted_at })),
            ];

            // Circuit breaker: count auto-trigger markers across ALL channels
            // (now including the inline replies the old code missed). The
            // marker — not the trigger phrase — is the round counter, so it
            // stays correct even if the phrase rotates.
            const autoFixCount = norm.filter((e) => e.body?.includes(MARKER)).length;

            const MAX_FIX_ROUNDS = 3;
            if (autoFixCount >= MAX_FIX_ROUNDS) {
              // Circuit breaker tripped: the review/fix loop isn't converging.
              // Stop auto-triggering, escalate to a human.
              core.warning(
                `Circuit breaker: ${autoFixCount} @claude fix rounds on PR #${prNumber} without converging; stopping and escalating to needs-owner.`,
              );
              // Ensure the current escalation label exists, then attach it.
              // New escalations use needs-owner; legacy needs-dima is still
              // honored by the gates that CHECK for it. createLabel is
              // best-effort (422 = already exists) so downstream repos that
              // don't have needs-owner yet still get it created.
              try {
                await github.rest.issues.createLabel({ owner, repo, name: 'needs-owner', color: 'd93f0b', description: 'Escalation — automation stopped, human needed' });
              } catch (e) { if (e.status !== 422) core.info(`createLabel needs-owner failed (ignored): ${e.message}`); }
              try {
                await github.rest.issues.addLabels({
                  owner, repo, issue_number: prNumber, labels: ['needs-owner'],
                });
              } catch (e) {
                core.info(`addLabel needs-owner failed (ignored): ${e.message}`);
              }
              // Telegram escalation (HTML; skip silently if unset).
              const tgToken = process.env.TELEGRAM_BOT_TOKEN;
              const tgChat = process.env.TELEGRAM_CHAT_ID;
              if (tgToken && tgChat) {
                try {
                  await fetch(`https://api.telegram.org/bot${tgToken}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                      chat_id: tgChat,
                      text: `🚨 <b>${repo}</b> PR #${prNumber}: ${autoFixCount} @claude fix rounds didn't converge — escalated to <b>needs-owner</b>.`,
                      parse_mode: 'HTML',
                      disable_web_page_preview: true,
                    }),
                  });
                } catch (e) {
                  core.info(`Telegram failed (ignored): ${e.message}`);
                }
              }
              core.setOutput("should_trigger", "false");
              return;
            }

            // Head-commit timestamp: anything Codex left AFTER this is feedback
            // on the current head (Codex re-reviews each push); anything the
            // bridge posted after this is THIS wave's trigger.
            const prCommits = await github.paginate(github.rest.pulls.listCommits, {
              owner, repo, pull_number: prNumber, per_page: 100,
            });
            const latestCommitDate = prCommits.length
              ? new Date(prCommits[prCommits.length - 1].commit.committer.date)
              : new Date(0);

            // P1-ONLY gate. Auto-trigger a (paid) Claude run only when at least
            // one ACTIVE P1 exists for the current head. P2 findings never
            // auto-trigger — Codex finds new P2s endlessly, which is the
            // infinite loop we are stopping. P2 notes stay on the PR for
            // reference; the owner can @claude fix a specific one by hand.
            // Detection reuses the EXISTING badge check (body.includes("P1")):
            // a Codex P1 badge contains the literal "P1" substring; a P2 badge
            // never does. We scan the triggering body PLUS every Codex note
            // left after the latest commit, so the wave's P1 is seen no matter
            // which event (review body or a sibling inline note) we run on.
            const currentBody =
              context.payload.comment?.body || context.payload.review?.body || "";
            const codexBodiesThisWave = norm
              .filter((e) => e.login === CODEX && e.date && new Date(e.date) > latestCommitDate)
              .map((e) => e.body || "");
            codexBodiesThisWave.push(currentBody);
            const hasP1 = codexBodiesThisWave.some((b) => b.includes("P1"));
            if (!hasP1) {
              core.info(
                `PR #${prNumber}: only P2 (no active P1) on the current head — P2 is advisory, not auto-triggering.`,
              );
              core.setOutput("should_trigger", "false");
              return;
            }

            // Cross-channel debounce: if a @claude fix marker already exists for
            // the current head in ANY channel, don't post again — Claude fixes
            // every P1 on the PR in a single run, so one trigger per wave is
            // enough. This is what collapses N inline events into ONE trigger.
            const alreadyThisWave = norm.some(
              (e) => e.body?.includes(MARKER) && e.date && new Date(e.date) > latestCommitDate,
            );
            if (alreadyThisWave) {
              core.info(
                `PR #${prNumber}: already triggered @claude fix for the current head (any channel); debouncing.`,
              );
              core.setOutput("should_trigger", "false");
              return;
            }

            core.info(
              `PR #${prNumber}: active P1 found; prior auto-fixes=${autoFixCount} — triggering one @claude fix.`,
            );
            core.setOutput("should_trigger", "true");
            core.setOutput("pr_number", prNumber.toString());

      - name: Comment on PR to trigger Claude fix
        if: steps.check_review.outputs.should_trigger == 'true'
        uses: actions/github-script@v7
        with:
          # AUTOMATION_PAT so the posted @claude comment actually triggers
          # claude.yml (GITHUB_TOKEN-authored comments don't start workflows).
          github-token: ${{ secrets.AUTOMATION_PAT }}
          script: |
            const prNumber = parseInt(
              "${{ steps.check_review.outputs.pr_number }}",
              10,
            );
            const eventName = context.eventName;
            const payload = context.payload;
            // First line is the bare phrase "@claude fix" — the
            // trigger claude.yml matches on (a "@claude" mention).
            // Codex reviews, Claude fixes: when Codex flags a P1 we
            // route the fix to Claude, never back to Codex. Keep this
            // first line literal so the mention parser sees it cleanly.
            //
            // "[auto-triggered]" stays on a later line as the
            // marker the circuit-breaker (previous step) counts.
            const baseBody = "@claude fix\n\n[auto-triggered]";

            // Route the trigger reply to wherever Codex left the
            // feedback so the bot can correlate the @-mention with
            // the specific finding it raised:
            //   - inline review-comment thread → reply in-thread
            //     via createReplyForReviewComment. Codex previously
            //     ignored PR-level @-mentions when the P1 was inline
            //     because there was no thread linkage; the result
            //     was P1s sitting unaddressed on PR #71 even though
            //     the auto-fix step thought it had triggered.
            //   - top-level pull_request_review → PR-level comment
            //     with the review URL appended AFTER the
            //     [auto-triggered] marker (so the trigger phrase
            //     stays on the first line); Codex (and any human
            //     reading later) can still jump to the review.
            //   - issue_comment → PR-level comment, unchanged from
            //     the legacy behaviour.
            if (
              eventName === 'pull_request_review_comment' &&
              payload.comment
            ) {
              await github.rest.pulls.createReplyForReviewComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                comment_id: payload.comment.id,
                body: baseBody,
              });
              core.info(
                `Auto-triggered Claude fix as inline reply on PR #${prNumber} (comment ${payload.comment.id})`,
              );
            } else if (
              eventName === 'pull_request_review' &&
              payload.review
            ) {
              const body =
                `@claude fix\n\n[auto-triggered]\n\n(review: ${payload.review.html_url})`;
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
              core.info(
                `Auto-triggered Claude fix on PR #${prNumber} (review ${payload.review.id})`,
              );
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: baseBody,
              });
              core.info(`Auto-triggered Claude fix on PR #${prNumber}`);
            }

  # Archive Codex post-fix summaries to the agent-memory repo so
  # Claude conversations can read them directly instead of needing
  # the owner to copy/paste from the PR. Triggers on every Codex
  # issue_comment that includes a "Summary" header (the marker for
  # a fix summary; review comments don't carry that header).
  #
  # The archive runs in parallel to trigger_codex_fix above —
  # different gating, different work — but BOTH may fire on the
  # same comment if Codex ever combines a summary with a P1/P2
  # tag. That's harmless: the trigger job posts an @codex comment
  # (which Codex ignores once it's already in summary mode), and
  # this job archives the summary regardless.
  archive_codex_summary:
    runs-on: ubuntu-latest
    # Serialize archive runs across the workflow. Two summaries
    # landing simultaneously would otherwise race the git push to
    # agent-memory; the second push would fail non-fast-forward.
    # cancel-in-progress=false queues runs instead of killing them
    # — every summary gets archived eventually.
    concurrency:
      group: codex-summary-archive
      cancel-in-progress: false
    if: |
      (github.event_name == 'issue_comment' &&
       github.event.comment.user.login == 'chatgpt-codex-connector[bot]' &&
       contains(github.event.comment.body, 'Summary')) ||
      (github.event_name == 'pull_request_review' &&
       github.event.review.user.login == 'chatgpt-codex-connector[bot]' &&
       contains(github.event.review.body, 'Summary')) ||
      (github.event_name == 'pull_request_review_comment' &&
       github.event.comment.user.login == 'chatgpt-codex-connector[bot]' &&
       contains(github.event.comment.body, 'Summary'))

    steps:
      - name: Fail-soft check for AGENT_MEMORY_PAT
        id: patcheck
        env:
          AGENT_MEMORY_PAT: ${{ secrets.AGENT_MEMORY_PAT }}
        run: |
          if [ -z "${AGENT_MEMORY_PAT}" ]; then
            echo "::notice::AGENT_MEMORY_PAT is not set — skipping Codex summary archive (fail-soft)."
            echo "has_pat=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_pat=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract Codex summary
        id: extract
        if: steps.patcheck.outputs.has_pat == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            // Codex emits its post-fix summary as one of three event
            // shapes: a top-level issue_comment, a full
            // pull_request_review submission, or an inline
            // pull_request_review_comment on a specific line. All
            // three carry the body + author + URL but on different
            // payload keys; normalise here so the rest of the script
            // doesn't branch.
            //   - PR review:           review payload, pull_request.number
            //   - Inline review comm.: comment payload, pull_request.number
            //   - Issue comment (PR):  comment payload, issue.number
            //                          (PRs are issues for the comments API)
            let source;
            let prNumber;
            if (context.eventName === 'pull_request_review') {
              source = context.payload.review;
              prNumber = context.payload.pull_request.number;
            } else if (context.eventName === 'pull_request_review_comment') {
              source = context.payload.comment;
              prNumber = context.payload.pull_request.number;
            } else {
              source = context.payload.comment;
              prNumber = context.payload.issue.number;
            }
            const body = source.body;
            const commentUrl = source.html_url;
            // Use the source object's actual submitted_at/created_at
            // timestamp rather than `new Date()` — keeps the log entry
            // timestamp accurate even when the workflow runs slightly
            // later than the comment/review was posted. Reviews use
            // submitted_at, comments use created_at.
            const commentDate =
              source.submitted_at ?? source.created_at ?? new Date().toISOString();

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            // Pull the "Reviewed commit: <sha>" line out of the
            // summary body when Codex includes it. Falls back to
            // 'unknown' so the log entry still renders.
            const commitMatch = body.match(
              /Reviewed commit:\s*`?([a-f0-9]+)`?/i,
            );
            const commit = commitMatch ? commitMatch[1] : "unknown";

            core.setOutput("pr_number", prNumber.toString());
            core.setOutput("pr_title", pr.title);
            core.setOutput("commit", commit);
            core.setOutput("comment_url", commentUrl);
            core.setOutput("date", commentDate);

            // Save body to a temp file. Multiline-safe and avoids
            // shell-escaping the body (which could contain
            // backticks, $, etc.) when it's passed downstream.
            const fs = require("fs");
            fs.writeFileSync("/tmp/codex-summary.md", body);

      - name: Clone agent-memory
        if: steps.patcheck.outputs.has_pat == 'true'
        env:
          PAT: ${{ secrets.AGENT_MEMORY_PAT }}
        run: |
          set -euo pipefail
          git clone "https://x-access-token:${PAT}@github.com/funzi7/agent-memory.git" /tmp/agent-memory
          cd /tmp/agent-memory
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Append entry to codex-log.md
        if: steps.patcheck.outputs.has_pat == 'true'
        env:
          PR_NUMBER: ${{ steps.extract.outputs.pr_number }}
          PR_TITLE: ${{ steps.extract.outputs.pr_title }}
          COMMIT: ${{ steps.extract.outputs.commit }}
          COMMENT_URL: ${{ steps.extract.outputs.comment_url }}
          DATE: ${{ steps.extract.outputs.date }}
          # Derived per-repo so the log lives under the running repo's
          # name in agent-memory instead of a hard-coded directory.
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail

          LOG_PATH=/tmp/agent-memory/${REPO_NAME}/codex-log.md
          mkdir -p "$(dirname "$LOG_PATH")"

          # Initialize file with the canonical header if missing.
          # The header is exactly 5 content lines + trailing blank
          # so the head/tail split below stays predictable.
          # Heredoc delimiter is intentionally unquoted so ${REPO_NAME}
          # expands in the header. No other $… tokens appear here, so
          # there's nothing else to escape.
          if [ ! -f "$LOG_PATH" ]; then
            cat > "$LOG_PATH" <<CODEXLOG_HEADER_EOF
          # Codex Activity Log — ${REPO_NAME}

          History of Codex auto-fix activities. Newest first.

          ---

          CODEXLOG_HEADER_EOF
          fi

          # Build the new entry. The wrapper heredoc uses unquoted
          # CODEXLOG_ENTRY_EOF so ${PR_NUMBER} etc. expand from
          # the env block above. $(cat ...) inlines the comment
          # body — its contents are NOT re-expanded by bash, so
          # any literal `$something` in the summary is safe.
          NEW_ENTRY=$(cat <<CODEXLOG_ENTRY_EOF
          ## PR #${PR_NUMBER} — ${PR_TITLE}
          **Date:** ${DATE}
          **Reviewed commit:** ${COMMIT}
          **Source:** [PR comment](${COMMENT_URL})

          $(cat /tmp/codex-summary.md)

          ---

          CODEXLOG_ENTRY_EOF
          )

          # Insert the new entry right after the 5-line header.
          # Strategy:
          #   lines 1..5 (header through `---`)
          #   blank
          #   new entry
          #   lines 6..N (everything else — prior entries)
          # Newest-first ordering preserved. printf is safer than
          # echo here — it doesn't interpret backslash escapes
          # regardless of shell options.
          head -n 5 "$LOG_PATH" > /tmp/log-new.md
          printf '\n' >> /tmp/log-new.md
          printf '%s\n' "$NEW_ENTRY" >> /tmp/log-new.md
          tail -n +6 "$LOG_PATH" >> /tmp/log-new.md

          mv /tmp/log-new.md "$LOG_PATH"

      - name: Commit and push to agent-memory
        if: steps.patcheck.outputs.has_pat == 'true'
        env:
          PR_NUMBER: ${{ steps.extract.outputs.pr_number }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail
          cd /tmp/agent-memory
          git add "${REPO_NAME}/codex-log.md"
          if git diff --staged --quiet; then
            echo "No changes to codex-log.md (entry was likely a duplicate); skipping push."
            exit 0
          fi
          git commit -m "chore(codex-log): archive PR #${PR_NUMBER} Codex summary"
          # Pull-with-rebase is belt-and-suspenders against the
          # concurrency group's serial guarantee: if a manual edit
          # to the file happens between clone and push, rebase
          # over it instead of failing.
          git pull --rebase origin main
          git push origin main
